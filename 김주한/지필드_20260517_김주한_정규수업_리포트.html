<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="color-scheme" content="light"><meta name="supported-color-schemes" content="light"><title>지필드 리포트 - 김주한</title><style>:root{color-scheme:light;}*{box-sizing:border-box;margin:0;padding:0;}html,body{background:#f4f5fb !important;color:#0f172a !important;color-scheme:light;}body{font-family:sans-serif;background:#f4f5fb !important;color:#0f172a !important;}.mobile-wrap{display:none;}.web-wrap{display:block;}@media(max-width:768px){.mobile-wrap{display:block;}.web-wrap{display:none;}body{background:#f4f5fb !important;color:#0f172a !important;}}.web-wrap{max-width:900px;margin:0 auto;padding:30px 24px;}.web-header{background:linear-gradient(135deg,#16417C,#2a5b9e);border-radius:20px;padding:28px 32px;color:#fff;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;}.hd-l h1{font-size:22px;font-weight:800;margin-bottom:4px;}.hd-l p{font-size:13px;opacity:.8;}.hd-r{text-align:right;}.s-name{font-size:28px;font-weight:800;}.date{font-size:13px;opacity:.8;margin-top:4px;}.badge{display:inline-block;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;margin-top:8px;}.rpt-mark-hl{background:linear-gradient(transparent 48%,#fef08a 48%);font-weight:800;padding:0 2px;border-radius:3px;}.rpt-mark-em{background:#dbeafe;color:#1e40af;font-weight:900;padding:1px 5px;border-radius:6px;}.rpt-mark-star{color:#c2410c;font-weight:900;}.photo-carousel{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;padding:4px 2px 14px;-webkit-overflow-scrolling:touch;}.photo-carousel::-webkit-scrollbar{height:7px;}.photo-carousel::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px;}.photo-card-view{position:relative;flex:0 0 min(74vw,320px);scroll-snap-align:center;border:none;background:#0f172a;border-radius:18px;overflow:hidden;box-shadow:0 12px 26px rgba(15,23,42,.16);padding:0;cursor:pointer;}.photo-card-view img{width:100%;aspect-ratio:3/4;object-fit:contain;display:block;background:#eef2ff;}.photo-caption-hand{position:absolute;left:12px;right:12px;bottom:12px;background:rgba(15,23,42,.54);color:#fff;border:1px solid rgba(255,255,255,.28);border-radius:14px;padding:9px 10px;text-align:center;font-family:'Comic Sans MS','Segoe Print','Nanum Pen Script','Apple SD Gothic Neo',cursive;font-size:17px;line-height:1.32;text-shadow:0 1px 2px rgba(0,0,0,.35);white-space:pre-wrap;}.photo-viewer{position:fixed;inset:0;background:rgba(2,6,23,.94);display:none;align-items:center;justify-content:center;z-index:9999;padding:18px;}.photo-viewer.show{display:flex;}.photo-viewer img{max-width:100%;max-height:86vh;object-fit:contain;border-radius:14px;background:#fff;}.photo-viewer-caption{position:fixed;left:18px;right:18px;bottom:18px;color:#fff;text-align:center;font-family:'Comic Sans MS','Segoe Print','Nanum Pen Script','Apple SD Gothic Neo',cursive;font-size:19px;line-height:1.35;text-shadow:0 2px 5px rgba(0,0,0,.6);white-space:pre-wrap;}.photo-viewer-close{position:fixed;right:14px;top:14px;width:42px;height:42px;border-radius:999px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.16);color:#fff;font-size:24px;line-height:1;cursor:pointer;}@media(max-width:640px){.web-wrap{padding:18px 12px;}.web-header{padding:20px 16px;display:block;}.hd-r{text-align:left;margin-top:10px;}.s-name{font-size:24px;}}</style></head><body><div class="web-wrap"><div class="web-header"><div class="hd-l"><h1>지필드 영재교육 학습 리포트</h1><p>G-Field Gifted Education</p><div class="badge">정규수업</div></div><div class="hd-r"><div class="s-name">김주한 학생</div><div class="date">2026.05.17</div></div></div><div style="background:#fffbeb;border:1px solid #fde68a;border-radius:16px;padding:16px;margin-bottom:16px;font-size:14px;line-height:1.7;white-space:pre-wrap;color:#451a03;">📢 ASSADDSAA<span class="rpt-mark-star">★ DSADASDSA</span></div><div class="rpt-sec" style="background:#fff;border-radius:20px;padding:24px 20px;margin-bottom:16px;box-shadow:0 4px 15px rgba(0,0,0,.03);"><div class="rpt-sec-title" style="font-size:16px;font-weight:800;color:#16417C;margin-bottom:16px;border-bottom:2px solid #16417C;display:inline-block;padding-bottom:4px;">📖 학습 요약</div><div style="background:#f8fafc;border-radius:12px;padding:15px;margin-bottom:10px;"><div style="font-weight:800;color:#1e293b;margin-bottom:8px;">📘 DSAASDSA</div><div style="white-space:pre-wrap;line-height:1.7;">SADSAD<span class="rpt-mark-hl">SASADSDA</span>DSA</div></div><div style="background:#f8fafc;border-radius:12px;padding:15px;margin-bottom:10px;"><div style="font-weight:800;color:#1e293b;margin-bottom:8px;">📘 ASSSDA</div><div style="white-space:pre-wrap;line-height:1.7;">DSADSA<span class="rpt-mark-em">ASDDSAS</span></div></div></div><div class="rpt-sec" style="background:#fff;border-radius:20px;padding:24px 20px;margin-bottom:16px;box-shadow:0 4px 15px rgba(0,0,0,.03);"><div class="rpt-sec-title" style="font-size:16px;font-weight:800;color:#16417C;margin-bottom:16px;border-bottom:2px solid #16417C;display:inline-block;padding-bottom:4px;">📸 수업 사진</div><div class="photo-carousel"><button type="button" class="photo-card-view" data-full="https://drive.google.com/thumbnail?id=18oDp8YjImIu8fCpYpl35gtXxCTkaMW4J&amp;sz=w1600" data-caption=""><img src="https://drive.google.com/thumbnail?id=18oDp8YjImIu8fCpYpl35gtXxCTkaMW4J&amp;sz=w700" onerror="this.src='https://drive.google.com/thumbnail?id=18oDp8YjImIu8fCpYpl35gtXxCTkaMW4J&amp;sz=w1600'" alt="수업 사진"></button><button type="button" class="photo-card-view" data-full="https://drive.google.com/thumbnail?id=1-Qzw8O6yvqoNyiV3VldCEPfc2Am9dj1Y&amp;sz=w1600" data-caption=""><img src="https://drive.google.com/thumbnail?id=1-Qzw8O6yvqoNyiV3VldCEPfc2Am9dj1Y&amp;sz=w700" onerror="this.src='https://drive.google.com/thumbnail?id=1-Qzw8O6yvqoNyiV3VldCEPfc2Am9dj1Y&amp;sz=w1600'" alt="수업 사진"></button></div><div style="margin-top:12px;text-align:center;font-family:'Pretendard','Noto Sans KR','Apple SD Gothic Neo',sans-serif;font-size:12px;font-weight:700;letter-spacing:.2px;color:#475569;">사진을 터치하면 크게 볼 수 있습니다</div></div><div style="text-align:center;margin:36px 0;font-size:11px;color:#94a3b8;">© G-Field Gifted Education</div></div><div class="photo-viewer" id="photoViewer" onclick="if(event.target.id==='photoViewer')closePhotoViewer()"><button class="photo-viewer-close" onclick="closePhotoViewer()" aria-label="닫기">×</button><img alt="확대 사진"><div class="photo-viewer-caption"></div></div><script>function openPhotoViewer(src,cap){var v=document.getElementById('photoViewer');if(!v)return;v.querySelector('img').src=src;v.querySelector('.photo-viewer-caption').textContent=cap||'';v.classList.add('show');document.body.style.overflow='hidden';}function closePhotoViewer(){var v=document.getElementById('photoViewer');if(!v)return;v.classList.remove('show');document.body.style.overflow='';}document.addEventListener('click',function(e){var card=e.target.closest&&e.target.closest('.photo-card-view');if(card)openPhotoViewer(card.dataset.full,card.dataset.caption||'');});document.addEventListener('keydown',function(e){if(e.key==='Escape')closePhotoViewer();});</script></body></html>
