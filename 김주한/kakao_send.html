<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>김주한 리포트 카카오 전송</title><script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script><style>body{font-family:Arial,'Noto Sans KR',sans-serif;background:#f4f5fb;margin:0;padding:24px;color:#172554}.card{max-width:720px;margin:30px auto;background:#fff;border-radius:22px;padding:26px;box-shadow:0 12px 30px rgba(15,23,42,.08)}h1{font-size:22px;margin-bottom:10px}.btn{width:100%;border:0;border-radius:14px;padding:16px;margin-top:12px;font-size:16px;font-weight:900;cursor:pointer}.kakao{background:#FEE500;color:#191919}.copy{background:#16417C;color:#fff}.open{background:#e2e8f0;color:#172554}textarea{width:100%;height:84px;border:1px solid #cbd5e1;border-radius:12px;padding:12px;margin-top:12px;font-size:13px;box-sizing:border-box}.note{font-size:12px;color:#64748b;line-height:1.6;margin-top:10px}</style></head><body><div class="card"><h1>김주한 학생 학습 리포트</h1><p>카카오톡 전송용 긴급 페이지입니다.</p><textarea id="msg" readonly>김주한 학생의 학습 리포트가 도착했습니다. 오늘 수업 내용과 과제를 확인해 주세요.</textarea><button class="btn kakao" onclick="sendKakao()">💬 카카오톡으로 리포트 보내기</button><button class="btn copy" onclick="copyLink()">🔗 링크 복사하기</button><button class="btn open" onclick="location.href=REPORT_URL">리포트 먼저 열기</button><div class="note" id="status">카카오 버튼이 안 되면 링크 복사하기를 눌러 카카오톡에 붙여넣으세요.</div></div><script>const REPORT_URL='https://docssam1.github.io/gfield-report/%EA%B9%80%EC%A3%BC%ED%95%9C/%EC%A7%80%ED%95%84%EB%93%9C_20260515_%EA%B9%80%EC%A3%BC%ED%95%9C_%EC%A0%95%EA%B7%9C%EC%88%98%EC%97%85_%EB%A6%AC%ED%8F%AC%ED%8A%B8.html';const THUMB='https://docssam1.github.io/gfield-report/assets/kakao/og-cover.png';function getKey(){const keys=['kakaoKey','KAKAO_JS_KEY','KAKAO_KEY','kakao_key','gfield_kakao_key','gfieldKakaoKey'];for(const k of keys){const v=localStorage.getItem(k);if(v)return v;}return '';}function initKakao(){const key=getKey();if(!key){document.getElementById('status').textContent='카카오 JavaScript 키가 이 브라우저에 저장되어 있지 않습니다. 링크 복사로 전송하세요.';return false;}try{if(!Kakao.isInitialized())Kakao.init(key);return true;}catch(e){document.getElementById('status').textContent='카카오 초기화 실패: '+e.message;return false;}}function sendKakao(){if(!initKakao()){copyLink();return;}Kakao.Share.sendDefault({objectType:'feed',content:{title:'김주한 학생 학습 리포트',description:'오늘 수업 내용과 과제를 확인해 주세요.',imageUrl:THUMB,imageWidth:800,imageHeight:400,link:{mobileWebUrl:REPORT_URL,webUrl:REPORT_URL}},buttons:[{title:'리포트 확인하기',link:{mobileWebUrl:REPORT_URL,webUrl:REPORT_URL}}]});}function copyLink(){const text=document.getElementById('msg').value+'\n'+REPORT_URL;if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>alert('복사 완료. 카카오톡에 붙여넣으세요.')).catch(()=>fallback(text));}else fallback(text);}function fallback(text){const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('복사 완료. 카카오톡에 붙여넣으세요.');}</script></body></html>
