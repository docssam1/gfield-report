<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>지필드 주변 교통 안내 카드 샘플</title>
  <style>
    body { margin: 0; padding: 24px; background: #f8fafc; font-family: Arial, sans-serif; color: #0f172a; }
    .card {
      max-width: 760px; margin: 0 auto; background: #fff;
      border: 1px solid #e5e7eb; border-radius: 14px; padding: 18px 18px 14px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
    }
    .title { font-size: 20px; font-weight: 800; color: #16417C; margin-bottom: 12px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; margin-bottom: 12px; }
    .row { font-size: 14px; display: flex; justify-content: space-between; gap: 8px; }
    .pill { border-radius: 999px; padding: 2px 8px; font-size: 12px; font-weight: 700; }
    .ok { background: #dcfce7; color: #166534; }
    .slow { background: #ffedd5; color: #9a3412; }
    .jam { background: #fee2e2; color: #991b1b; }
    .unknown { background: #e5e7eb; color: #374151; }
    .msg { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
    .warn { color: #9f1239; font-size: 13px; margin-bottom: 8px; }
    .updated { color: #64748b; font-size: 12px; text-align: right; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">🚦 지필드 주변 교통 안내</div>
    <div id="closed" class="msg" style="display:none;"></div>
    <div id="content" style="display:none;">
      <div class="grid" id="grid"></div>
      <div class="msg" id="message"></div>
      <div class="warn">※ 세븐일레븐 / SNT / 대치 스터디타워 방향은 최후 수단입니다.</div>
      <div class="updated" id="updated"></div>
    </div>
  </div>

  <script>
    function cls(status) {
      if (status === '원활') return 'ok';
      if (status === '서행') return 'slow';
      if (status === '정체') return 'jam';
      return 'unknown';
    }

    function row(label, status) {
      return `<div class="row"><span>${label}</span><span class="pill ${cls(status)}">${status || '확인필요'}</span></div>`;
    }

    async function render() {
      const res = await fetch('./latest-traffic.json?_=' + Date.now());
      const data = await res.json();

      if (data.status === 'closed') {
        document.getElementById('closed').style.display = 'block';
        document.getElementById('closed').textContent = data.parentMessage || '현재는 교통 안내 운영 시간이 아닙니다.';
        return;
      }

      document.getElementById('content').style.display = 'block';
      document.getElementById('grid').innerHTML = [
        row('정문 앞 100m', data.front100m),
        row('반경 500m 이면도로', data.inner500m),
        row('반경 1km 주요도로', data.main1km),
        row('EM프라자 방향', data.emRoute),
        row('주민센터 방향', data.centerRoute),
        row('북측 우회 방향', data.northRoute),
        row('최후 수단 구간', data.emergencyRoute)
      ].join('');

      document.getElementById('message').textContent =
        '현재 안내: ' + (data.parentMessage || data.recommendation || '교통 정보를 확인 중입니다.');
      document.getElementById('updated').textContent =
        '최근 업데이트: ' + (data.updatedAt || '-');
    }

    render().catch(() => {
      const el = document.getElementById('closed');
      el.style.display = 'block';
      el.textContent = '교통 정보를 불러오지 못했습니다.';
    });
  </script>
</body>
</html>
