<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>G-Field Traffic Monitor</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; }
    #mapCaptureRoot { width: 1280px; height: 720px; margin: 0 auto; position: relative; background: #0b1220; overflow: hidden; }
    #map { width: 100%; height: 100%; }
    .legend {
      position: absolute; left: 16px; bottom: 16px; z-index: 20;
      background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 12px; padding: 10px 12px; font-size: 12px; line-height: 1.5;
    }
    .legend b { color: #fbbf24; }
    .zone-tag {
      position: absolute; z-index: 15; background: rgba(15, 23, 42, 0.86);
      color: #fff; border: 1px solid rgba(255,255,255,.25); border-radius: 8px;
      font-size: 11px; font-weight: 700; padding: 4px 7px;
      backdrop-filter: blur(2px);
    }
    #tag-front { top: 290px; left: 620px; }
    #tag-em { top: 250px; left: 460px; }
    #tag-center { top: 360px; left: 760px; }
    #tag-north { top: 150px; left: 620px; }
    #tag-emergency { top: 470px; left: 530px; border-color: rgba(248,113,113,.8); color: #fecaca; }
    #status {
      position: absolute; top: 10px; left: 10px; z-index: 30; font-size: 12px;
      background: rgba(2, 6, 23, 0.75); border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 8px; padding: 6px 10px;
    }
  </style>
</head>
<body>
  <div id="mapCaptureRoot">
    <div id="status">네이버 TrafficLayer 로딩 중...</div>
    <div id="map"></div>
    <div class="zone-tag" id="tag-front">정문 앞 100m</div>
    <div class="zone-tag" id="tag-em">EM프라자 방향</div>
    <div class="zone-tag" id="tag-center">주민센터 방향</div>
    <div class="zone-tag" id="tag-north">북측 우회</div>
    <div class="zone-tag" id="tag-emergency">최후 수단 구간</div>
    <div class="legend">
      <div><b>지필드 영재교육</b> 주변 교통 모니터</div>
      <div>• 정문 앞 100m</div>
      <div>• EM프라자 방향</div>
      <div>• 대치4동 주민센터 방향</div>
      <div>• 북측 우회 방향</div>
      <div>• 최후 수단: 세븐일레븐 / SNT / 대치 스터디타워</div>
    </div>
  </div>

  <script>
    const centerLat = 37.500991;
    const centerLng = 127.058758;
    const params = new URLSearchParams(location.search);
    const ncpClientId = params.get('ncpClientId') || '';
    const statusEl = document.getElementById('status');

    function loadNaverScript() {
      return new Promise((resolve, reject) => {
        if (!ncpClientId) return reject(new Error('NCP_CLIENT_ID 누락'));
        const script = document.createElement('script');
        script.src = 'https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=' + encodeURIComponent(ncpClientId);
        script.onload = resolve;
        script.onerror = () => reject(new Error('네이버 지도 스크립트 로드 실패'));
        document.head.appendChild(script);
      });
    }

    function initMap() {
      const map = new naver.maps.Map('map', {
        center: new naver.maps.LatLng(centerLat, centerLng),
        zoom: 16,
        mapTypeControl: true
      });
      const trafficLayer = new naver.maps.TrafficLayer({ interval: 300000 });
      naver.maps.Event.once(map, 'init', function () {
        trafficLayer.setMap(map);
        statusEl.textContent = 'TrafficLayer ON / 5분 주기 갱신';
      });
    }

    (async function main() {
      try {
        await loadNaverScript();
        initMap();
      } catch (err) {
        statusEl.textContent = '지도 로딩 실패: ' + (err.message || err);
      }
    })();
  </script>
</body>
</html>
