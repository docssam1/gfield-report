<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>지필드 영재교육 학습 리포트</title>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.1/kakao.min.js" integrity="sha384-kDljxUXHaJ9xAb2sz/1A11s2+ZkKTtZ54yqZ0hS22DkX2HwZ+BwO/nQyA3bSFOk+" crossorigin="anonymous"></script>
<style>
:root{--accent:#16417C; --accent-g:linear-gradient(135deg,#16417C,#2a5b9e); --surface:#ffffff; --bg:#f4f5fb; --border:#e4e6f5; --text:#1a1d2e; --muted:#7b7f9e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
.wrap{max-width:820px;margin:0 auto;padding:28px 16px 60px;}
.header{border-radius:24px;padding:32px 36px;color:#fff;margin-bottom:24px;background:var(--accent-g); text-align:center;}
.hd-sub{font-size:14px; opacity:.9; font-weight:600; margin-bottom:4px;}
.hd-title{font-size:26px; font-weight:800; letter-spacing:-.5px; margin-bottom:14px;}
.hd-tags{display:flex; gap:8px; flex-wrap:wrap; justify-content:center;}
.hd-tag{padding:5px 14px;border-radius:20px;background:rgba(255,255,255,0.18);font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid rgba(255,255,255,0.3);}
.hd-tag.active{background:#fff;color:var(--accent);}
.icard{background:var(--surface);border-radius:16px;padding:14px 18px;border:1.5px solid var(--border);}
.ilabel{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.8px;margin-bottom:7px;}
.icard input{border:none;outline:none;font-size:14px;font-weight:700;color:var(--text);width:100%;background:transparent;}
.gemini-btn{background:#f0f4ff; color:#16417C; border:1px solid #c7d2fe; padding:4px 8px; border-radius:6px; font-size:11px; font-weight:800; cursor:pointer; margin-left:8px;}
.sec{background:var(--surface);border-radius:20px;padding:22px 24px;margin-bottom:14px;border:1.5px solid var(--border);}
.sec-hd{display:flex;align-items:center;gap:12px;margin-bottom:16px; justify-content:space-between;}
.sec-title{font-size:15px;font-weight:800;color:var(--text);}
.photos-grid{display:flex; flex-wrap:wrap; gap:10px; margin-top:12px;}
.photo-card{position:relative; display:flex; flex-direction:column; gap:6px; width:160px; background:#fafbff; border:1px solid var(--border); padding:8px; border-radius:12px;}
.photo-card img{width:100%; height:120px; object-fit:cover; border-radius:8px;}
.hw-row{display:grid; grid-template-columns:30% 1fr; border:1.5px solid var(--border); border-top:none;}
.hw-row.three-col{grid-template-columns:30% 20% 1fr;}
.hw-c1, .hw-c2, .hw-c3{padding:8px 10px; border-right:1.5px solid var(--border);}
.hw-c1 input, .hw-c2 textarea, .hw-c3 textarea, .hw-c2 select{width:100%; border:1px solid var(--border); border-radius:8px; padding:8px; font-size:13px; outline:none; background:#fafbff;}
.btns{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px;}
.kakao-btn{grid-column:1 / -1; background:#FEE500; color:#191919; border:none; border-radius:14px; padding:15px; font-weight:800; cursor:pointer; font-size:15px; margin-bottom:10px;}
.btn-dl{padding:15px; background:linear-gradient(135deg,#16417C,#2a5b9e); color:#fff; border:none; border-radius:14px; font-size:14px; font-weight:800; cursor:pointer;}
.btn-gh{padding:15px; background:linear-gradient(135deg,#22c55e,#16a34a); color:#fff; border:none; border-radius:14px; font-size:14px; font-weight:800; cursor:pointer;}
.toast{position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:#1a1d2e; color:#fff; padding:12px 24px; border-radius:30px; font-size:13px; font-weight:700; opacity:0; transition:opacity .3s; z-index:9999;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
  <div class="hd-text-wrap">
    <div class="hd-sub">성공하는 공부습관을 만드는</div>
    <div class="hd-title" id="hdTitle">지필드 영재교육 (정규수업)</div>
    <div class="hd-tags">
      <div class="hd-tag active" data-type="정규수업" onclick="setType(this)">정규수업</div>
      <div class="hd-tag" data-type="보강" onclick="setType(this)">보강</div>
      <div class="hd-tag" data-type="결석" onclick="setType(this)">결석</div>
    </div>
  </div>
</div>

<div class="info-row" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:12px;">
  <div class="icard"><div class="ilabel">학생 이름</div><input type="text" id="nameInput" placeholder="홍길동"></div>
  <div class="icard"><div class="ilabel">날짜</div><input type="date" id="dateInput"></div>
  <div class="icard"><div class="ilabel">과정</div><input type="text" id="courseInput" placeholder="심화 수학"></div>
</div>

<div class="notice">
  <div class="nlabel">📢 기타 전달 사항 <button class="gemini-btn" onclick="askGemini('noticeArea')">✨ 제미나이 추천</button></div>
  <textarea id="noticeArea" style="width:100%; border:none; background:transparent; font-size:14px; min-height:60px; outline:none; line-height:1.6;" placeholder="내용을 입력하세요."></textarea>
</div>

<div class="sec">
  <div class="sec-hd">
    <div class="sec-title">✅ 과제 확인 <button class="gemini-btn" onclick="askGemini('hwList')">✨ 코멘트 다듬기</button></div>
  </div>
  <div id="hwList"></div>
  <button style="width:100%; padding:10px; margin-top:10px; border:1.5px dashed #ccc; border-radius:10px; cursor:pointer;" onclick="addHwRow()">+ 과제 항목 추가</button>
</div>

<div class="sec">
  <div class="sec-hd"><div class="sec-title">📖 학습 내용 요약 <button class="gemini-btn" onclick="askGemini('subjectList')">✨ 요약 다듬기</button></div></div>
  <div id="subjectList"></div>
  <button style="width:100%; padding:10px; border:1.5px dashed #ccc; border-radius:10px; cursor:pointer;" onclick="addSubjRow()">+ 학습 내용 추가</button>
</div>

<div class="sec">
  <div class="sec-hd"><div class="sec-title">📸 사진 첨부</div></div>
  <input type="file" accept="image/*" multiple onchange="handlePhotoUpload(event,'classPhotos')">
  <div class="photos-grid" id="classPhotos"></div>
</div>

<div class="sec">
  <div class="sec-hd"><div class="sec-title">🎬 동영상 강의 (유튜브)</div></div>
  <div style="display:flex; gap:8px; margin-bottom:12px;">
    <input type="url" id="videoUrlInput" placeholder="유튜브 링크" style="flex:1; border:1px solid var(--border); border-radius:8px; padding:8px; outline:none;">
    <button style="padding:8px 12px; background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer;" onclick="addVideo()">추가</button>
  </div>
  <div id="videoList" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
</div>

<div class="sec">
  <div class="sec-hd"><div class="sec-title">✏️ 오늘의 과제 (다음에 불러오기 가능)</div></div>
  <div class="hw-head three-col" style="display:grid; grid-template-columns:30% 20% 1fr; background:#f7f8fe; border:1px solid var(--border); font-size:11px; font-weight:bold; text-align:center; padding:8px 0;">
    <div>과정</div><div>구분</div><div>내용</div>
  </div>
  <div id="todayHwList"></div>
  <button style="width:100%; padding:10px; border:1.5px dashed #ccc; border-radius:10px; cursor:pointer;" onclick="addTodayHwRow()">+ 과제 추가</button>
</div>

<div class="link-result" id="linkResult" style="display:none; background:#eff6ff; padding:15px; border-radius:14px; margin-bottom:15px; border:1px solid #93c5fd;">
  <div style="font-size:11px; font-weight:800; color:#1d4ed8; margin-bottom:5px;">🌐 접속 링크 (학부모용)</div>
  <a id="resultUrl" href="#" target="_blank" style="font-size:13px; color:#2563eb; word-break:break-all;"></a>
</div>

<div class="btns">
  <button class="kakao-btn" onclick="shareKakao()">💬 카카오톡으로 리포트 카드 보내기</button>
  <button class="btn-dl" id="saveDriveBtn" onclick="saveToDrive()">💾 1단계: 구글 드라이브 백업</button>
  <button class="btn-gh" id="ghBtn" onclick="deployToGitHubPages()">🔗 2단계: 웹 링크 배포</button>
</div>
<button style="width:100%; margin-top:20px; padding:10px; background:#e2e8f0; border:none; border-radius:10px; cursor:pointer; font-weight:bold; color:#475569;" onclick="resetKeys()">🔄 저장된 보안키 초기화 (오류 시 클릭)</button>

<div class="toast" id="toast"></div>
</div>

<script>
// ==========================================
// 🚨 여기에 새로 배포한 구글 스크립트 URL을 넣어주세요! 🚨
const scriptUrl = "https://script.google.com/macros/s/AKfycbz5ThsUsfoaogRDHnQA41HSA5mTjRS_03r2Kp0Oz1g9Z-MVaJKniXA5wOwQRRH8m0X9/exec";
// ==========================================
const kakaoKey  = "80a3cebdeeebcc2563e570a6fe62d8da"; 

try { if (window.Kakao && !Kakao.isInitialized()) Kakao.init(kakaoKey); } catch(e){}

let classType = '정규수업';
let classPhotos = [];
document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

function setType(el){
  document.querySelectorAll('.hd-tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  classType = el.dataset.type;
  document.getElementById('hdTitle').textContent = `지필드 영재교육 (${classType})`;
}

// 🔐 브라우저 금고(localStorage)
function getSecretKey(keyName, promptMsg) {
  let key = localStorage.getItem(keyName);
  if (!key || key === 'null') {
    key = prompt(promptMsg);
    if (key) localStorage.setItem(keyName, key.trim());
  }
  return key;
}

function resetKeys() {
  if(confirm("저장된 제미나이/깃허브 키를 모두 지우시겠습니까?\n다시 발급받아 입력할 수 있습니다.")) {
    localStorage.removeItem('gemini_key');
    localStorage.removeItem('gh_token');
    alert("초기화 완료!");
  }
}

// ✨ 제미나이 AI 실시간 문장 다듬기
async function askGemini(areaId) {
  const myGeminiKey = getSecretKey('gemini_key', "✨ [최초 1회 입력]\n구글 AI 스튜디오에서 발급받은 '제미나이 API 키'를 붙여넣으세요.");
  if (!myGeminiKey) return;

  let targets = (areaId === 'noticeArea') ? [document.getElementById(areaId)] : document.querySelectorAll(`#${areaId} textarea.v-content`);
  let hasText = false, errorCount = 0;

  for (let target of targets) {
    const originalText = target.value.trim();
    if (!originalText || originalText.startsWith("✨")) continue; 
    hasText = true;
    target.value = "✨ 제미나이가 문장을 다듬고 있습니다... 잠시만 기다려주세요.";
    
    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${myGeminiKey}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ contents: [{ parts: [{ text: `다음은 학원 수업 리포트 내용입니다. 오타를 수정하고 조금 더 전문적이며 친절한 어조로 다듬어주세요. 결과만 출력하세요:\n\n${originalText}` }] }] })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || "API 오류");
      target.value = data.candidates[0].content.parts[0].text.trim();
    } catch (e) {
      target.value = originalText;
      errorCount++;
    }
  }
  if (!hasText) showToast('다듬을 내용을 먼저 입력해 주세요.');
  else if (errorCount > 0) alert(`❌ AI 연결 실패!\n입력하신 제미나이 키가 잘못되었거나 만료되었습니다.\n맨 아래 [보안키 초기화] 버튼을 누르고 새 키를 넣어주세요.`);
  else showToast('✨ 문장이 완벽하게 다듬어졌습니다!');
}

function addHwRow(course='', content=''){
  const id=Date.now();
  const div=document.createElement('div'); div.className='hw-row'; div.id=`hw-${id}`;
  div.innerHTML=`<div class="hw-c1"><input type="text" class="v-course" placeholder="과정명" value="${course}"></div><div class="hw-c2" style="position:relative;"><textarea class="v-content" placeholder="코멘트">${content}</textarea><button style="border:none; background:none; color:red; cursor:pointer; position:absolute; right:8px; top:8px;" onclick="document.getElementById('hw-${id}').remove()">✕</button></div>`;
  document.getElementById('hwList').appendChild(div);
}
function addSubjRow(subj='', content=''){
  const id=Date.now();
  const div=document.createElement('div'); div.id=`subj-${id}`; div.style="border:1px solid var(--border); border-radius:14px; margin-bottom:10px; overflow:hidden;";
  div.innerHTML=`<div style="padding:10px; background:#fafbff; display:flex; justify-content:space-between;"><input type="text" class="v-subj" value="${subj}" placeholder="과목명" style="border:none; background:transparent; font-weight:bold; outline:none; width:90%;"><button style="border:none; background:none; cursor:pointer;" onclick="document.getElementById('subj-${id}').remove()">✕</button></div><textarea class="v-content" style="width:100%; border:none; padding:10px; min-height:60px; outline:none;" placeholder="학습 내용">${content}</textarea>`;
  document.getElementById('subjectList').appendChild(div);
}
function addTodayHwRow(course='', type='필수', content=''){
  const id=Date.now();
  const div=document.createElement('div'); div.className='hw-row three-col'; div.id=`thw-${id}`;
  div.innerHTML=`<div class="hw-c1"><input type="text" class="v-course" value="${course}"></div><div class="hw-c2"><select class="v-type"><option ${type==='필수'?'selected':''}>필수</option><option ${type==='선택'?'selected':''}>선택</option></select></div><div class="hw-c3" style="position:relative;"><textarea class="v-content">${content}</textarea><button style="border:none; background:none; color:red; cursor:pointer; position:absolute; right:8px; top:8px;" onclick="document.getElementById('thw-${id}').remove()">✕</button></div>`;
  document.getElementById('todayHwList').appendChild(div);
}
function addVideo(){
  const url = document.getElementById('videoUrlInput').value;
  const m = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
  if(!m) return;
  const id=Date.now();
  const div=document.createElement('div'); div.id=`vid-${id}`; div.style="width:150px; position:relative;";
  div.innerHTML=`<img src="https://img.youtube.com/vi/${m[1]}/hqdefault.jpg" style="width:100%; border-radius:8px;" data-url="${url}"><input type="text" class="v-cmt" placeholder="영상 코멘트" style="width:100%; border:1px solid var(--border); font-size:11px; margin-top:4px;"><button style="position:absolute; top:-5px; right:-5px; background:red; color:#fff; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer;" onclick="document.getElementById('vid-${id}').remove()">✕</button>`;
  document.getElementById('videoList').appendChild(div); document.getElementById('videoUrlInput').value='';
}
addHwRow(); addSubjRow(); addTodayHwRow();

function handlePhotoUpload(e, cid){
  Array.from(e.target.files).forEach(f=>{
    const r = new FileReader();
    r.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const cvs = document.createElement('canvas'); const MAX = 500; const sc = MAX/img.width;
        cvs.width = MAX; cvs.height = img.height*sc;
        cvs.getContext('2d').drawImage(img,0,0,cvs.width,cvs.height);
        classPhotos.push({id:Date.now()+Math.random(), src:cvs.toDataURL('image/jpeg',0.6), driveUrl:'', caption:''});
        renderPhotos(cid, classPhotos);
      }; img.src = ev.target.result;
    }; r.readAsDataURL(f);
  });
}
function renderPhotos(cid, arr){
  const g=document.getElementById(cid); g.innerHTML='';
  arr.forEach(p=>{
    const d=document.createElement('div'); d.className='photo-card';
    d.innerHTML=`<img src="${p.src}"><input type="url" style="font-size:10px; margin-top:4px;" class="photo-input" placeholder="원본 링크" oninput="p.driveUrl=this.value"><input type="text" style="font-size:10px; margin-top:2px;" class="photo-input" placeholder="설명" oninput="p.caption=this.value"><button style="position:absolute; top:-5px; left:-5px; background:red; color:#fff; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer;" onclick="removePhoto('${p.id}')">✕</button>`;
    g.appendChild(d);
  });
}
function removePhoto(pid){
  classPhotos=classPhotos.filter(x=>x.id!=pid);
  renderPhotos('classPhotos', classPhotos);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function buildSnapshot(){
  const name = document.getElementById('nameInput').value || '학생';
  const dateStr = document.getElementById('dateInput').value.replace(/-/g, '.');
  const notice = document.getElementById('noticeArea').value;

  let hwR='', subH='', vidH='', tHwH='', hideD='';
  document.querySelectorAll('#hwList .hw-row').forEach(r=>{
    const c=r.querySelector('.v-course').value; const t=r.querySelector('.v-content').value;
    if(c||t) hwR+=`<div style="display:flex; border-bottom:1px solid #eee; padding:10px 0;"><div style="width:35%; font-weight:700; color:#16417C;">${esc(c)}</div><div style="flex:1; white-space:pre-wrap;">${esc(t)}</div></div>`;
  });
  document.querySelectorAll('#subjectList .subj-row').forEach(r=>{
    const n=r.querySelector('.v-subj').value; const t=r.querySelector('.v-content').value;
    if(n||t) subH+=`<div style="background:#f8fafc; border-radius:12px; padding:15px; margin-bottom:10px;"><div style="font-weight:800; color:#1e293b; margin-bottom:8px;">📘 ${esc(n)}</div><div style="white-space:pre-wrap; line-height:1.6;">${esc(t)}</div></div>`;
  });
  document.querySelectorAll('#videoList div').forEach(r=>{
    const img = r.querySelector('img'); if(!img) return;
    const u=img.getAttribute('data-url'); const s=img.src; const c=r.querySelector('.v-cmt').value;
    vidH+=`<div style="margin-bottom:15px;"><a href="${u}" target="_blank" style="display:block; position:relative;"><img src="${s}" style="width:100%; border-radius:12px;"><div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(255,0,0,0.8); color:#fff; width:40px; height:40px; border-radius:50%; text-align:center; line-height:40px;">▶</div></a>${c?`<div style="text-align:center; margin-top:5px; font-weight:600;">${esc(c)}</div>`:''}</div>`;
  });
  document.querySelectorAll('#todayHwList .hw-row').forEach(r=>{
    const c=r.querySelector('.v-course').value; const t=r.querySelector('.v-type').value; const ct=r.querySelector('.v-content').value;
    if(c||ct){
      tHwH+=`<div style="display:flex; border-bottom:1px solid #e2e8f0; padding:12px 0;"><div style="width:30%; font-weight:700; color:#16417C;">${esc(c)}</div><div style="width:15%;"><span style="background:${t==='필수'?'#ef4444':'#3b82f6'}; color:#fff; font-size:10px; padding:2px 5px; border-radius:4px;">${t}</span></div><div style="flex:1; white-space:pre-wrap;">${esc(ct)}</div></div>`;
      hideD+=`<div class="data-today-hw" data-course="${esc(c)}" data-content="${esc(ct)}" style="display:none;"></div>`;
    }
  });

  const photoRender = (arr) => arr.map(p=>`<div style="margin-bottom:20px;">${p.driveUrl?`<a href="${esc(p.driveUrl)}" target="_blank">`:''}<img src="${p.src}" style="width:100%; border-radius:12px; border:1px solid #eee;">${p.driveUrl?`</a>`:''}${p.caption?`<div style="text-align:center; margin-top:5px; font-size:13px; color:#666;">${esc(p.caption)}</div>`:''}</div>`).join('');
  const sec = (title, icon, content) => content ? `<div style="background:#fff; border-radius:20px; padding:24px 20px; margin-bottom:16px; box-shadow:0 4px 15px rgba(0,0,0,0.03);"><div style="font-size:16px; font-weight:800; color:#16417C; margin-bottom:16px; border-bottom:2px solid #16417C; display:inline-block; padding-bottom:4px;">${icon} ${title}</div>${content}</div>` : '';

  return `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>지필드 영재교육 Report</title>
<style>*{box-sizing:border-box; margin:0; padding:0;} body{font-family:'Apple SD Gothic Neo',sans-serif; background:#f1f5f9; color:#0f172a;} .app{max-width:480px; margin:0 auto; min-height:100vh; position:relative;}</style>
</head><body><div class="app">
  <div id="cover" style="background:#0d1117; height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:30px; position:relative;">
    <div style="border:1px solid #d4af37; border-radius:12px; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px; position:relative;">
      <div style="color:#d4af37; font-size:11px; font-weight:700; letter-spacing:2px; margin-bottom:20px;">G-FIELD GIFTED EDUCATION</div>
      <div style="color:#fff; font-size:18px; margin-bottom:8px;">성공하는 공부습관을 만드는</div>
      <div style="color:#fff; font-size:26px; font-weight:800; margin-bottom:20px;">지필드 영재교육 (${classType})</div>
      <div style="width:80%; height:1px; background:#333; margin:40px 0;"></div>
      <div style="color:#fff; font-size:24px; font-weight:800; margin-bottom:8px;">${esc(name)} 학생</div>
      <div style="color:#888; font-size:13px; margin-bottom:40px;">${dateStr} 결산 리포트</div>
      <button onclick="document.getElementById('cover').style.display='none'; document.getElementById('main').style.display='block'; window.scrollTo(0,0);" style="background:#d4af37; color:#000; border:none; padding:14px 35px; border-radius:35px; font-weight:800; cursor:pointer; box-shadow:0 4px 15px rgba(212,175,55,0.3);">리포트 확인하기 ▼</button>
    </div>
  </div>
  <div id="main" style="display:none; padding:20px 16px;">
    <div style="background:#fff; border-radius:16px; padding:20px; margin-bottom:16px; display:flex; justify-content:space-between; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.03);">
      <div><div style="font-size:11px; color:#64748b; margin-bottom:4px;">학생</div><div style="font-weight:800; color:#16417C;">${esc(name)}</div></div>
      <div><div style="font-size:11px; color:#64748b; margin-bottom:4px;">날짜</div><div style="font-weight:800; color:#16417C;">${dateStr}</div></div>
      <div><div style="font-size:11px; color:#64748b; margin-bottom:4px;">유형</div><div style="font-weight:800; color:#16417C;">${classType}</div></div>
    </div>
    ${notice?`<div style="background:#fffbeb; border:1px solid #fde68a; border-radius:16px; padding:16px; margin-bottom:16px; font-size:14px; line-height:1.6; white-space:pre-wrap; color:#451a03;">📢 ${esc(notice)}</div>`:''}
    ${sec('과제 확인', '✅', hwR)}
    ${sec('학습 요약', '📖', subH)}
    ${sec('수업 사진', '📸', photoRender(classPhotos))}
    ${sec('동영상 강의', '🎬', vidH)}
    ${sec('오늘의 과제', '✏️', tHwH)}
    <div style="text-align:center; margin:40px 0; font-size:11px; color:#94a3b8;">© G-Field Gifted Education.</div>
    ${hideD}
  </div>
</div></body></html>`;
}

// 💡 1단계: 구글 드라이브 자동 저장 (에러 회피 방식 적용 완료)
async function saveToDrive() {
  const name = document.getElementById('nameInput').value.trim();
  if(!name) { showToast('학생 이름을 입력해 주세요.'); return; }
  const btn = document.getElementById('saveDriveBtn');
  btn.disabled = true; btn.textContent = "⏳ 저장 중...";
  const dateStr = document.getElementById('dateInput').value.replace(/-/g, '');
  const fileName = `지필드_${dateStr}_${name}_${classType}_리포트.html`;
  
  try {
    // 헤더를 완전히 제거하여 브라우저가 preflight(보안 검사)를 하지 않고 바로 넘어가도록 만들었습니다.
    const res = await fetch(scriptUrl, {
      method: 'POST',
      body: JSON.stringify({ studentName: name, fileName: fileName, htmlContent: buildSnapshot() })
    });
    const result = await res.json();
    if(result.result === "success") {
      showToast(`✅ '${name}' 폴더에 저장되었습니다.`);
      document.getElementById('resultUrl').href = result.url;
      document.getElementById('resultUrl').textContent = result.url;
      document.getElementById('linkResult').style.display = 'block';
    } else { throw new Error(result.error); }
  } catch (e) { 
    alert("❌ 구글 드라이브 에러!\n\n구글 앱스 스크립트에서 [새 배포]를 하실 때, 반드시 '모든 사용자(Anyone)' 권한으로 설정하셔야 합니다.\n'Google 계정이 있는 모든 사용자'를 선택하시면 이 에러가 발생합니다."); 
  }
  finally { btn.disabled = false; btn.textContent = "💾 1단계: 구글 드라이브 백업"; }
}

async function deployToGitHubPages(){
  const myGhToken = getSecretKey('gh_token', "🔗 [최초 1회 입력]\n깃허브에서 발급받은 토큰(ghp_...)을 붙여넣으세요.");
  if (!myGhToken) return;

  let ghUser = "docssam1";
  let ghRepo = "gfield-report";
  const btn = document.getElementById('ghBtn');
  btn.disabled = true; btn.textContent = '⏳ 배포 중...';
  
  try {
    const name = document.getElementById('nameInput').value.trim() || '학생';
    const dateStr = document.getElementById('dateInput').value.replace(/-/g, '');
    const path = `${name}/지필드_${dateStr}_${name}_${classType}_리포트.html`;
    const contentEncoded = btoa(unescape(encodeURIComponent(buildSnapshot())));
    const apiUrl = `https://api.github.com/repos/${ghUser}/${ghRepo}/contents/${path}`;
    const headers = { 'Authorization': `Bearer ${myGhToken}`, 'Content-Type': 'application/json' };
    
    let sha = null;
    const checkRes = await fetch(apiUrl, { headers });
    if (checkRes.ok) sha = (await checkRes.json()).sha;
    
    const body = { message: `[자동배포] ${name} 학생 리포트`, content: contentEncoded, branch: 'main' };
    if (sha) body.sha = sha;
    
    const uploadRes = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
    if (!uploadRes.ok) throw new Error('GitHub 실패');
    
    const pageUrl = `https://${ghUser}.github.io/${ghRepo}/${path}`;
    document.getElementById('resultUrl').href = pageUrl;
    document.getElementById('resultUrl').textContent = pageUrl;
    document.getElementById('linkResult').style.display = 'block';
    showToast('🎉 배포 완료!');
  } catch (e) { 
    alert('❌ 깃허브 배포 오류!\n입력하신 깃허브 토큰이 만료되었거나 권한(repo)이 없습니다.\n맨 아래 [보안키 초기화] 버튼을 누르고 새 토큰을 넣어주세요.'); 
  }
  finally { btn.disabled = false; btn.textContent = '🔗 2단계: 웹 링크 배포'; }
}

function shareKakao(){
  const nm = document.getElementById('nameInput').value.trim() || 'ㅇㅇ';
  const d = new Date(document.getElementById('dateInput').value);
  const dateStr = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
  const url = document.getElementById('resultUrl').href;
  
  if(url === '#' || url === '') { alert('🚨 먼저 1단계(저장) 또는 2단계(배포)를 눌러주세요!'); return; }
  
  try {
    Kakao.Share.sendDefault({
      objectType: 'feed',
      content: {
        title: `지필드 영재교육 (${classType})`,
        description: `[지필드 영재교육]\n${dateStr} ${nm} 학생의 학습 리포트가 도착했습니다.`,
        imageUrl: 'https://drive.google.com/uc?export=view&id=1-Qzw8O6yvqoNyiV3VldCEPfc2Am9dj1Y',
        link: { mobileWebUrl: url, webUrl: url }
      },
      buttons: [{ title: '리포트 확인하기', link: { mobileWebUrl: url, webUrl: url } }]
    });
  } catch(e) { alert("❌ 카카오톡 전송 차단됨! 선생님의 깃허브 주소(docssam1.github.io)로 접속해서 실행해 주세요."); }
}

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
