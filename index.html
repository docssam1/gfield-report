<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>지필드 영재교육 스마트 CRM & 리포트</title>
<!-- 카카오 SDK -->
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
<!-- 엑셀(XLSX) 라이브러리 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{--accent:#16417C;--accent-g:linear-gradient(135deg,#16417C,#2a5b9e);--surface:#fff;--bg:#f4f5fb;--border:#e4e6f5;--text:#1a1d2e;--muted:#7b7f9e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px; position:relative;}

/* 레이아웃 */
.page-layout { display: flex; max-width: 1200px; margin: 0 auto; padding: 20px; gap: 24px; align-items: flex-start; }
.main-content { flex: 1; min-width: 0; }
.sidebar { width: 340px; flex-shrink: 0; display:flex; flex-direction:column; gap:20px; position: sticky; top: 20px;}

/* 상단 모드 스위치 */
.mode-toggle-wrap { background:#fff; border-radius:30px; padding:6px; display:flex; position:relative; box-shadow:0 4px 10px rgba(0,0,0,0.05); margin-bottom:20px; border:1px solid var(--border); }
.mode-toggle-wrap label { flex:1; text-align:center; padding:12px; font-weight:800; color:var(--muted); cursor:pointer; z-index:2; transition:0.3s; font-size:15px; }
.mode-toggle-wrap input[type="radio"] { display:none; }
.mode-toggle-wrap input[type="radio"]:checked + span { color:#fff; }
.slider { position:absolute; top:6px; bottom:6px; left:6px; width:calc(50% - 12px); background:var(--accent-g); border-radius:24px; transition:0.3s ease; z-index:1; }
input[value="상담"]:checked ~ .slider { transform:translateX(100%); background:linear-gradient(135deg,#eab308,#d97706); }

/* 헤더 */
.header{border-radius:24px;padding:32px;color:#fff;margin-bottom:24px;background:var(--accent-g);text-align:center; transition:0.4s;}
.header.cs-mode { background:linear-gradient(135deg,#eab308,#d97706); }
.hd-title{font-size:26px;font-weight:800;letter-spacing:-.5px;}

/* 공통 카드 및 입력폼 */
.sec{background:var(--surface);border-radius:20px;padding:22px;margin-bottom:14px;border:1.5px solid var(--border);}
.icard{background:var(--surface);border-radius:16px;padding:14px;border:1.5px solid var(--border); position:relative; margin-bottom:10px;}
.ilabel{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.8px;margin-bottom:7px;text-transform:uppercase;}
.icard input, .icard select{border:none;outline:none;font-size:14px;font-weight:700;color:var(--text);width:100%;background:transparent;}

/* AI 미니 챗봇 */
.ai-sidebar-box { background: #fff; border-radius: 20px; border: 1.5px solid #3b82f6; overflow:hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
.ai-head { background: #eff6ff; padding: 15px; font-weight: 800; color: #1d4ed8; display:flex; align-items:center; gap:8px; }
.chat-window { height: 350px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f8fafc; }
.msg { padding: 10px 14px; border-radius: 12px; font-size: 13px; max-width: 85%; line-height: 1.5; word-break: break-word; }
.msg.user { background: #e0e7ff; color: #1e3a8a; align-self: flex-end; border-bottom-right-radius: 2px; }
.msg.ai { background: #fff; color: #334155; align-self: flex-start; border: 1px solid #e2e8f0; border-bottom-left-radius: 2px; }
.ai-input-area { padding: 15px; border-top: 1px solid #eee; }
#aiChatInput { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px; resize: none; outline: none; font-family: inherit; font-size: 13px; }
#aiImgPrev { display:none; position:relative; margin-bottom:8px; width: fit-content; }
#aiImgPrev img { max-height: 80px; border-radius: 8px; border: 1px solid #ddd; }
#aiImgPrev button { position:absolute; top:-5px; right:-5px; background:red; color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer; font-size:10px; }

/* 토스트 알림 */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1d2e;color:#fff;padding:12px 24px;border-radius:30px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10000;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:20px;padding:28px;max-width:480px;width:90%;}

.photos-grid{display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;}
.photo-card{width:120px; position:relative;} .photo-card img{width:100%; border-radius:10px; border:1px solid #eee;}
</style>
</head>
<body>

<div class="page-layout">
  <div class="main-content">
    
    <!-- 모드 선택 -->
    <div class="mode-toggle-wrap">
      <label><input type="radio" name="docType" value="리포트" checked onclick="toggleMode()"><span>📚 학습 리포트 모드</span></label>
      <label><input type="radio" name="docType" value="상담" onclick="toggleMode()"><span>📞 CS 관리 모드</span></label>
      <div class="slider"></div>
    </div>

    <div class="header" id="mainHeader">
      <div class="hd-title" id="hdTitle">지필드 영재교육 (정규수업)</div>
    </div>

    <!-- 기본 정보 -->
    <div class="sec">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="icard">
          <div class="ilabel">학생 이름 / 뒷번호 4자리</div>
          <input type="text" id="nameInput" placeholder="홍길동 또는 3075" onkeypress="if(event.key==='Enter') searchStudent()">
          <button onclick="searchStudent()" style="position:absolute; right:12px; top:28px; border:none; background:none; cursor:pointer; font-size:18px;">🔍</button>
        </div>
        <div class="icard">
          <div class="ilabel">날짜 (상담/수업일)</div>
          <input type="date" id="dateInput">
        </div>
      </div>
      <div class="icard">
        <div class="ilabel">과정명</div>
        <input type="text" id="courseInput" placeholder="심화 사고력 수학">
      </div>
    </div>

    <!-- CS 패널 -->
    <div id="csPanel" style="display:none;" class="sec">
      <h3 style="color:#d97706; margin-bottom:15px;">👤 학생 상세 정보</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div class="icard"><div class="ilabel">학교</div><input type="text" id="dbSchool"></div>
        <div class="icard"><div class="ilabel">학년</div><input type="text" id="dbGrade"></div>
        <div class="icard"><div class="ilabel">연락처</div><input type="text" id="dbPhone"></div>
        <div class="icard">
          <div class="ilabel">구분</div>
          <select id="dbStatus"><option value="재원생">재원생</option><option value="퇴원생">퇴원생</option><option value="비재원">비재원</option></select>
        </div>
      </div>
      <textarea id="csMemo" placeholder="상담 내용을 입력하세요." style="width:100%; height:100px; border:1px solid #ddd; border-radius:12px; padding:15px; outline:none; font-family:inherit;"></textarea>
      <button onclick="saveDbData()" style="width:100%; padding:15px; background:#d97706; color:#fff; border:none; border-radius:12px; margin-top:12px; font-weight:800; cursor:pointer;">💾 DB 개별 저장</button>
    </div>

    <!-- 엑셀 업로드 버튼 -->
    <div class="sec" style="text-align:center;">
      <button onclick="document.getElementById('csvModal').classList.add('show')" style="width:100%; padding:18px; background:#10b981; color:#fff; border:none; border-radius:16px; font-weight:800; cursor:pointer; font-size:15px;">📁 엑셀 일괄 업로드 (상담일 우선 양식)</button>
    </div>

    <!-- 사진 추가 (드라이브 연동) -->
    <div class="sec">
      <div class="sec-title" style="margin-bottom:12px;">📸 수업 사진 (PC 첨부 또는 드라이브 링크)</div>
      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <input type="text" id="drivePhotoUrl" placeholder="☁️ 구글 드라이브 공유 링크 붙여넣기" style="flex:1; border:1px solid #ddd; border-radius:10px; padding:10px; outline:none;">
        <button onclick="addDrivePhoto()" style="padding:10px 18px; background:#16417C; color:#fff; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">추가</button>
      </div>
      <input type="file" accept="image/*" multiple onchange="handleLocalPhoto(event)" style="font-size:12px;">
      <div class="photos-grid" id="photoList"></div>
    </div>

  </div> <!-- main-content 끝 -->

  <!-- 사이드바: AI 비서 (상고모드) -->
  <div class="sidebar">
    <div class="ai-sidebar-box">
      <div class="ai-head">🤖 지필드 AI 수학 비서 (상고모드)</div>
      <div class="chat-window" id="chatWin">
        <div class="msg ai">안녕하세요 원장님! 수학 문제 이미지(Ctrl+V)나 질문을 남겨주시면 정확한 상고모드로 풀이해 드립니다.</div>
      </div>
      <div class="ai-input-area">
        <div id="aiImgPrev"><img src="" id="aiPreview"><button onclick="removeAiImg()">✕</button></div>
        <textarea id="aiChatInput" placeholder="질문 입력 또는 이미지 붙여넣기..." rows="2" onkeypress="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendAiChat();}"></textarea>
        <button onclick="sendAiChat()" id="aiBtn" style="width:100%; padding:12px; background:#2563eb; color:#fff; border:none; border-radius:10px; margin-top:8px; font-weight:800; cursor:pointer;">AI에게 물어보기</button>
      </div>
    </div>
  </div>
</div>

<!-- 엑셀 모달 -->
<div class="modal-overlay" id="csvModal">
  <div class="modal">
    <h3 style="color:#16417C; margin-bottom:15px;">📁 엑셀 일괄 업로드</h3>
    <p style="font-size:12px; color:#666; margin-bottom:15px; line-height:1.5;">
      <b>필수 양식 (7열 순서 중요):</b><br>
      상담일, 이름, 학교, 학년, 연락처, 구분, 상담내용
    </p>
    <button onclick="downloadTemplate()" style="width:100%; padding:10px; background:#f1f5f9; border:1px solid #ddd; border-radius:10px; cursor:pointer; font-weight:bold; margin-bottom:15px;">📄 엑셀 양식 다운로드</button>
    <input type="file" id="xlsxFile" accept=".xlsx" style="width:100%; margin-bottom:20px;">
    <div style="display:flex; gap:10px;">
      <button onclick="processXlsx()" style="flex:2; padding:15px; background:#10b981; color:#fff; border:none; border-radius:12px; font-weight:800; cursor:pointer;">🚀 업로드 시작</button>
      <button onclick="document.getElementById('csvModal').classList.remove('show')" style="flex:1; padding:15px; background:#eee; color:#666; border:none; border-radius:12px; cursor:pointer;">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- 설정 및 유틸 ---
const KEYS = { gemini: 'gf_gemini_key', script: 'gf_script_url', sheetId: 'gf_sheet_id' };
const getKey = k => localStorage.getItem(KEYS[k]) || '';
const showToast = m => { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); };

// 모드 전환
let currentMode = '리포트';
function toggleMode() {
  currentMode = document.querySelector('input[name="docType"]:checked').value;
  document.getElementById('mainHeader').className = currentMode==='상담' ? 'header cs-mode' : 'header';
  document.getElementById('csPanel').style.display = currentMode==='상담' ? 'block' : 'none';
}

// 학생 검색
function searchStudent() {
  const q = document.getElementById('nameInput').value.trim();
  if(!q) return showToast('이름을 입력하세요.');
  fetch(getKey('script'), {method:'POST', body:JSON.stringify({action:'search_student', query:q, sheetId:getKey('sheetId')})})
  .then(r=>r.json()).then(d=>{
    if(d.found) {
      document.getElementById('dbSchool').value = d.info.school || '';
      document.getElementById('dbGrade').value = d.info.grade || '';
      document.getElementById('dbPhone').value = d.info.phone || '';
      document.getElementById('dbStatus').value = d.info.status || '재원생';
      showToast('정보를 로드했습니다.');
    } else showToast('신규 학생입니다.');
  });
}

// 개별 저장
function saveDbData() {
  const p = { 
    action:'update_student', 
    name:document.getElementById('nameInput').value, 
    school:document.getElementById('dbSchool').value, 
    grade:document.getElementById('dbGrade').value, 
    phone:document.getElementById('dbPhone').value, 
    status:document.getElementById('dbStatus').value, 
    content:document.getElementById('csMemo').value, 
    date:document.getElementById('dateInput').value,
    sheetId:getKey('sheetId') 
  };
  fetch(getKey('script'), {method:'POST', body:JSON.stringify(p)}).then(()=>showToast('성공적으로 저장되었습니다!'));
}

// --- 🌟 AI 챗봇 (상고모드 + 이미지 붙여넣기) 🌟 ---
let attachedAiImg = null;
document.getElementById('aiChatInput').addEventListener('paste', e => {
  const item = Array.from(e.clipboardData.items).find(x => x.type.startsWith('image/'));
  if(item) {
    const reader = new FileReader();
    reader.onload = ev => { 
      attachedAiImg = ev.target.result; 
      document.getElementById('aiImgPrev').style.display='block'; 
      document.getElementById('aiPreview').src=attachedAiImg; 
    };
    reader.readAsDataURL(item.getAsFile());
  }
});

function removeAiImg() { attachedAiImg = null; document.getElementById('aiImgPrev').style.display='none'; }

async function sendAiChat() {
  const input = document.getElementById('aiChatInput');
  const text = input.value.trim();
  if(!text && !attachedAiImg) return;

  const win = document.getElementById('chatWin');
  win.innerHTML += `<div class="msg user">${attachedAiImg ? '<img src="'+attachedAiImg+'" style="max-width:100%; border-radius:8px;"><br>':''}${text}</div>`;
  win.scrollTop = win.scrollHeight;
  
  const btn = document.getElementById('aiBtn'); btn.disabled=true; btn.innerText='⏳ 풀이 중...';

  try {
    const apiKey = getKey('gemini');
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
    const parts = text ? [{text: text}] : [{text: "이 이미지를 상고모드로 분석해서 풀어줘."}];
    if(attachedAiImg) parts.push({inlineData:{mimeType:'image/png', data:attachedAiImg.split(',')[1]}});

    const res = await fetch(url, {
      method:'POST', 
      headers:{'Content-Type':'application/json'}, 
      body:JSON.stringify({
        contents:[{parts}], 
        systemInstruction:{parts:[{text:"너는 지필드 영재교육의 AI 비서야. 원장님의 질문에 친절하게 답변해. 특히 수학 문제를 답할 때는 정확한 상고모드로 오답이 없게 단계별로 논리적인 풀이를 제공해줘."}]}
      })
    });
    const d = await res.json();
    const reply = d.candidates[0].content.parts[0].text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
    win.innerHTML += `<div class="msg ai">${reply}</div>`;
  } catch(e) { win.innerHTML += `<div class="msg ai" style="color:red;">오류 발생: API 키를 확인해주세요.</div>`; }
  finally { 
    btn.disabled=false; btn.innerText='AI에게 물어보기'; input.value=''; 
    removeAiImg(); win.scrollTop=win.scrollHeight; 
  }
}

// --- 🌟 엑셀(XLSX) 로직 (상담일 제일 앞으로 수정) 🌟 ---
function downloadTemplate() {
  // 상담일이 A열(첫 번째)로 이동
  const data = [["상담일","이름","학교","학년","연락처","구분","상담내용"], ["2026-05-03","홍길동","대치초","초3","010-1234-5678","재원생","수업 태도 매우 우수함"]];
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "학생데이터");
  XLSX.writeFile(wb, "지필드_학생DB_양식(상담일우선).xlsx");
}

function processXlsx() {
  const f = document.getElementById('xlsxFile').files[0];
  if(!f) return alert('파일을 선택하세요.');
  const r = new FileReader();
  r.onload = e => {
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data, {type:'array'});
    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:''});
    const students = json.map(row => ({
      date: row['상담일'],
      name: row['이름'], 
      school: row['학교'], 
      grade: row['학년'], 
      phone: String(row['연락처']),
      status: row['구분'], 
      content: row['상담내용']
    }));
    fetch(getKey('script'), {method:'POST', body:JSON.stringify({action:'bulk_upload', students, sheetId:getKey('sheetId')})})
    .then(r=>r.json()).then(res => { 
      if(res.result==='success') { showToast('✅ 업로드 완료!'); document.getElementById('csvModal').classList.remove('show'); }
      else if(res.result==='conflict') alert('⚠️ 일부 학생의 학년 정보가 다릅니다. 시트에서 확인해주세요.');
    });
  };
  r.readAsArrayBuffer(f);
}

// --- 🌟 사진 관리 (드라이브 및 로컬) 🌟 ---
function addDrivePhoto() {
  const url = document.getElementById('drivePhotoUrl').value;
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(!m) return alert('유효한 구글 드라이브 공유 링크가 아닙니다.');
  const thumb = `https://drive.google.com/thumbnail?id=${m[1]}&sz=w400`;
  const html = `<div class="photo-card"><img src="${thumb}"><button onclick="this.parentElement.remove()" style="position:absolute; top:0; right:0; background:red; color:#fff; border:none; border-radius:50%; cursor:pointer;">✕</button></div>`;
  document.getElementById('photoList').innerHTML += html;
  document.getElementById('drivePhotoUrl').value = '';
}

function handleLocalPhoto(e) {
  Array.from(e.target.files).forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => {
      const html = `<div class="photo-card"><img src="${ev.target.result}"><button onclick="this.parentElement.remove()" style="position:absolute; top:0; right:0; background:red; color:#fff; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer;">✕</button></div>`;
      document.getElementById('photoList').innerHTML += html;
    };
    reader.readAsDataURL(f);
  });
}
</script>
</body>
</html>
