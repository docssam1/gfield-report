<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>지필드 영재교육 학습 리포트 (관리자용)</title>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
<style>
:root{--accent:#16417C;--accent-g:linear-gradient(135deg,#16417C,#2a5b9e);--surface:#fff;--bg:#f4f5fb;--border:#e4e6f5;--text:#1a1d2e;--muted:#7b7f9e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
.wrap{max-width:820px;margin:0 auto;padding:28px 16px 60px;}
.header{border-radius:24px;padding:32px 36px;color:#fff;margin-bottom:24px;background:var(--accent-g);text-align:center;}
.hd-sub{font-size:14px;opacity:.9;font-weight:600;margin-bottom:4px;}
.hd-title{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:14px;}
.hd-tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.hd-tag{padding:5px 14px;border-radius:20px;background:rgba(255,255,255,.18);font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid rgba(255,255,255,.3);}
.hd-tag.active{background:#fff;color:var(--accent);}
.icard{background:var(--surface);border-radius:16px;padding:14px 18px;border:1.5px solid var(--border);}
.ilabel{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.8px;margin-bottom:7px;text-transform:uppercase;}
.icard input{border:none;outline:none;font-size:14px;font-weight:700;color:var(--text);width:100%;background:transparent;}
.gemini-btn{background:#f0f4ff;color:#16417C;border:1px solid #c7d2fe;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:800;cursor:pointer;margin-left:8px;}
.sec{background:var(--surface);border-radius:20px;padding:22px 24px;margin-bottom:14px;border:1.5px solid var(--border);}
.sec-hd{display:flex;align-items:center;gap:12px;margin-bottom:16px;justify-content:space-between;}
.sec-title{font-size:15px;font-weight:800;color:var(--text);}
.photos-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
.photo-card{position:relative;display:flex;flex-direction:column;gap:6px;width:160px;background:#fafbff;border:1px solid var(--border);padding:8px;border-radius:12px;}
.photo-card img{width:100%;height:120px;object-fit:cover;border-radius:8px;}
.photo-input{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px;font-size:11px;outline:none;}
.hw-row{display:grid;grid-template-columns:30% 1fr;border:1.5px solid var(--border);border-top:none;overflow:hidden;}
.hw-row.three-col{grid-template-columns:30% 20% 1fr;}
.hw-c1,.hw-c2,.hw-c3{padding:8px 10px;border-right:1.5px solid var(--border);}
.hw-c1 input,.hw-c2 textarea,.hw-c3 textarea,.hw-c2 select{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:13px;outline:none;background:#fafbff;}
.hw-c2 textarea,.hw-c3 textarea{resize:vertical;min-height:50px;}

/* 링크 결과 */
.link-result{display:none;background:#eff6ff;padding:15px;border-radius:14px;margin-bottom:15px;border:1px solid #93c5fd;}

/* 문자 복사 박스 */
.msg-box{background:#fffbeb;border:1.5px solid #fde68a;border-radius:14px;padding:16px 18px;margin-bottom:14px;display:none;}
.msg-box-label{font-size:11px;font-weight:800;color:#92400e;margin-bottom:10px;letter-spacing:.5px;}
.msg-box textarea{width:100%;border:1px solid #fde68a;border-radius:10px;padding:12px;font-size:13px;font-family:inherit;background:#fff;color:#1a1d2e;resize:none;min-height:110px;line-height:1.7;outline:none;}
.msg-copy-btn{margin-top:8px;background:#f59e42;color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:13px;font-weight:800;cursor:pointer;width:100%;}

/* 버튼 */
.btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;}
.kakao-btn{grid-column:1/-1;background:#FEE500;color:#191919;border:none;border-radius:14px;padding:15px;font-weight:800;cursor:pointer;font-size:15px;margin-bottom:10px;}
.btn-dl{padding:15px;background:var(--accent-g);color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;}
.btn-gh{padding:15px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1d2e;color:#fff;padding:12px 24px;border-radius:30px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <div class="hd-sub">성공하는 공부습관을 만드는</div>
  <div class="hd-title" id="hdTitle">지필드 영재교육 (정규수업)</div>
  <div class="hd-tags">
    <div class="hd-tag active" data-type="정규수업" onclick="setType(this)">정규수업</div>
    <div class="hd-tag" data-type="보강" onclick="setType(this)">보강</div>
    <div class="hd-tag" data-type="결석" onclick="setType(this)">결석</div>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;">
  <div class="icard"><div class="ilabel">학생 이름</div><input type="text" id="nameInput" placeholder="홍길동"></div>
  <div class="icard"><div class="ilabel">날짜</div><input type="date" id="dateInput"></div>
  <div class="icard"><div class="ilabel">과정</div><input type="text" id="courseInput" placeholder="심화 수학"></div>
</div>

<div class="sec" style="background:#fffbf0;border-color:#fde68a;">
  <div style="font-size:11px;font-weight:800;color:#92400e;margin-bottom:8px;">📢 기타 전달 사항 <button class="gemini-btn" onclick="askGemini('noticeArea')">✨ AI 다듬기</button></div>
  <textarea id="noticeArea" style="width:100%;border:none;background:transparent;font-size:14px;min-height:60px;outline:none;line-height:1.6;" placeholder="내용을 입력하세요."></textarea>
</div>

<div class="sec">
  <div class="sec-hd">
    <div class="sec-title">✅ 과제 확인 <button class="gemini-btn" onclick="askGemini('hwList')">✨ AI 다듬기</button></div>
    <label style="cursor:pointer;font-size:12px;color:var(--accent);font-weight:bold;">
      <input type="file" accept=".html" style="display:none;" onchange="loadHomework(event)">📂 이전 과제 불러오기
    </label>
  </div>
  <div style="display:grid;grid-template-columns:30% 1fr;background:#f7f8fe;border:1.5px solid var(--border);border-radius:10px 10px 0 0;">
    <div style="padding:9px 12px;font-size:11px;font-weight:700;color:var(--muted);">과정</div>
    <div style="padding:9px 12px;font-size:11px;font-weight:700;color:var(--muted);border-left:1.5px solid var(--border);">수행 및 코멘트</div>
  </div>
  <div id="hwList"></div>
  <button style="width:100%;padding:10px;margin-top:10px;border:1.5px dashed #ccc;border-radius:10px;cursor:pointer;background:transparent;" onclick="addHwRow()">+ 과제 항목 추가</button>
  <div style="margin-top:20px;border-top:1px dashed #eee;padding-top:15px;">
    <div class="ilabel">📎 과제 사진</div>
    <input type="file" accept="image/*" multiple onchange="handlePhotoUpload(event,'hwPhotos')">
    <div class="photos-grid" id="hwPhotos"></div>
  </div>
</div>

<div class="sec">
  <div class="sec-hd"><div class="sec-title">📖 학습 내용 요약 <button class="gemini-btn" onclick="askGemini('subjectList')">✨ AI 다듬기</button></div></div>
  <div id="subjectList"></div>
  <button style="width:100%;padding:10px;border:1.5px dashed #ccc;border-radius:10px;cursor:pointer;background:transparent;" onclick="addSubjRow()">+ 학습 내용 추가</button>
</div>

<div class="sec">
  <div class="sec-hd"><div class="sec-title">📸 수업 사진</div></div>
  <input type="file" accept="image/*" multiple onchange="handlePhotoUpload(event,'classPhotos')">
  <div class="photos-grid" id="classPhotos"></div>
</div>

<div class="sec">
  <div class="sec-hd"><div class="sec-title">🎬 동영상 강의 (유튜브)</div></div>
  <div style="display:flex;gap:8px;margin-bottom:12px;">
    <input type="url" id="videoUrlInput" placeholder="유튜브 링크" style="flex:1;border:1px solid var(--border);border-radius:8px;padding:8px;outline:none;">
    <button style="padding:8px 12px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;" onclick="addVideo()">추가</button>
  </div>
  <div id="videoList" style="display:flex;flex-wrap:wrap;gap:10px;"></div>
</div>

<div class="sec">
  <div class="sec-hd"><div class="sec-title">🔗 추가 자료 링크</div></div>
  <div id="resourceList"></div>
  <button style="width:100%;padding:10px;border:1.5px dashed #ccc;border-radius:10px;cursor:pointer;background:transparent;" onclick="addResourceRow()">+ 링크 추가</button>
</div>

<div class="sec">
  <div class="sec-hd"><div class="sec-title">✏️ 오늘의 과제</div></div>
  <div style="display:grid;grid-template-columns:30% 20% 1fr;background:#f7f8fe;border:1px solid var(--border);border-radius:10px 10px 0 0;font-size:11px;font-weight:700;color:var(--muted);text-align:center;padding:9px 0;">
    <div>과정</div><div>구분</div><div>내용</div>
  </div>
  <div id="todayHwList"></div>
  <button style="width:100%;padding:10px;border:1.5px dashed #ccc;border-radius:10px;cursor:pointer;background:transparent;" onclick="addTodayHwRow()">+ 과제 추가</button>
</div>

<!-- 링크 결과 -->
<div class="link-result" id="linkResult">
  <div style="font-size:11px;font-weight:800;color:#1d4ed8;margin-bottom:5px;">🌐 리포트 링크 (학부모 공유용)</div>
  <a id="resultUrl" href="#" target="_blank" style="font-size:13px;color:#2563eb;word-break:break-all;"></a>
</div>

<!-- 문자 메시지 복사 박스 -->
<div class="msg-box" id="msgBox">
  <div class="msg-box-label">📱 카카오톡 실패 시 — 문자/카톡 직접 복사 붙여넣기</div>
  <textarea id="msgText" readonly></textarea>
  <button class="msg-copy-btn" onclick="copyMsg()">📋 메시지 복사하기</button>
</div>

<div class="btns">
  <button class="kakao-btn" onclick="shareKakao()">💬 카카오톡으로 리포트 카드 보내기</button>
  <button class="btn-dl" id="saveDriveBtn" onclick="saveToDrive()">💾 1단계: 구글 드라이브 저장</button>
  <button class="btn-gh" id="ghBtn" onclick="deployToGitHubPages()">🔗 2단계: 웹 링크 생성</button>
</div>
<button style="width:100%;margin-top:12px;padding:10px;background:#e2e8f0;border:none;border-radius:10px;cursor:pointer;font-weight:bold;color:#475569;" onclick="resetKeys()">🔄 보안키 초기화</button>

<div class="toast" id="toast"></div>
</div>

<script>
// ── 설정값 ──
const scriptUrl = "https://script.google.com/macros/s/AKfycbzUEMjV2Yfgvylt720snlM9ueDCE6aNId8tWIm5uWvUMcZdNJFypUNvZBK2K5CoxP8/exec";
const geminiKey = "AIzaSyCiunVDFwgelojwIo24HjoCzdocIwnTAEM";
const ghToken   = "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";
const ghUser    = "docssam1";
const ghRepo    = "gfield-report";
const kakaoKey  = "80a3cebdeeebcc2563e570a6fe62d8da";

// 카카오 SDK 초기화 — DOMContentLoaded 이후 보장
function initKakao(){
  try {
    if(window.Kakao){
      if(!Kakao.isInitialized()) Kakao.init(kakaoKey);
    }
  } catch(e){ console.warn('Kakao init:', e); }
}
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', initKakao);
} else { initKakao(); }

let classType = '정규수업';
let hwPhotos = [], classPhotos = [];

document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

function setType(el){
  document.querySelectorAll('.hd-tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); classType = el.dataset.type;
  document.getElementById('hdTitle').textContent = `지필드 영재교육 (${classType})`;
  updateMsgBox();
}

function resetKeys(){
  if(confirm('저장된 키를 지우시겠습니까?')){
    localStorage.removeItem('gemini_key'); localStorage.removeItem('gh_token');
    alert('초기화 완료!');
  }
}

// ── 제미나이 AI ──
async function askGemini(areaId){
  let targets = areaId==='noticeArea' ? [document.getElementById(areaId)] : document.querySelectorAll(`#${areaId} textarea.v-content`);
  let hasText=false, errCount=0, lastErr='';
  for(let t of targets){
    const orig = t.value.trim();
    if(!orig || orig.startsWith('✨')) continue;
    hasText=true; t.value='✨ 다듬는 중...';
    try {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`,{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({contents:[{parts:[{text:`다음은 학원 수업 리포트 내용입니다. 오타를 수정하고 전문적이며 친절한 어조로 다듬어주세요. 결과만 출력하세요:\n\n${orig}`}]}]})
      });
      const d = await r.json();
      if(!r.ok) throw new Error(d.error?.message||'API 오류');
      t.value = d.candidates[0].content.parts[0].text.trim();
    } catch(e){ t.value=orig; errCount++; lastErr=e.message; }
  }
  if(!hasText) showToast('다듬을 내용을 입력해 주세요.');
  else if(errCount>0) alert(`❌ AI 연결 실패\n원인: ${lastErr}`);
  else showToast('✨ 다듬기 완료!');
}

// ── 행 추가 ──
function addHwRow(course='', content=''){
  const id='hw'+Date.now()+Math.random().toString(36).slice(2,5);
  const d=document.createElement('div'); d.className='hw-row'; d.id=id;
  d.innerHTML=`<div class="hw-c1"><input type="text" class="v-course" placeholder="과정명" value="${course}"></div>
    <div class="hw-c2" style="position:relative;"><textarea class="v-content" placeholder="코멘트">${content}</textarea>
    <button style="border:none;background:none;color:red;cursor:pointer;position:absolute;right:8px;top:8px;" onclick="getElementById('${id}').remove()">✕</button></div>`;
  // 버튼 클릭 수정
  d.querySelector('button').onclick = ()=>d.remove();
  document.getElementById('hwList').appendChild(d);
}
function addSubjRow(subj='', content=''){
  const id='subj'+Date.now()+Math.random().toString(36).slice(2,5);
  const d=document.createElement('div'); d.id=id; d.style='border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;';
  d.innerHTML=`<div style="padding:10px;background:#fafbff;display:flex;justify-content:space-between;">
    <input type="text" class="v-subj" value="${subj}" placeholder="과목명" style="border:none;background:transparent;font-weight:bold;outline:none;width:90%;">
    <button style="border:none;background:none;cursor:pointer;">✕</button></div>
    <textarea class="v-content" style="width:100%;border:none;padding:10px;min-height:60px;outline:none;" placeholder="학습 내용">${content}</textarea>`;
  d.querySelector('button').onclick=()=>d.remove();
  document.getElementById('subjectList').appendChild(d);
}
function addTodayHwRow(course='', type='필수', content=''){
  const id='thw'+Date.now()+Math.random().toString(36).slice(2,5);
  const d=document.createElement('div'); d.className='hw-row three-col'; d.id=id;
  d.innerHTML=`<div class="hw-c1"><input type="text" class="v-course" value="${course}"></div>
    <div class="hw-c2"><select class="v-type"><option ${type==='필수'?'selected':''}>필수</option><option ${type==='선택'?'selected':''}>선택</option></select></div>
    <div class="hw-c3" style="position:relative;"><textarea class="v-content">${content}</textarea>
    <button style="border:none;background:none;color:red;cursor:pointer;position:absolute;right:8px;top:8px;">✕</button></div>`;
  d.querySelector('button').onclick=()=>d.remove();
  document.getElementById('todayHwList').appendChild(d);
}
function addResourceRow(name='', link=''){
  const id='res'+Date.now()+Math.random().toString(36).slice(2,5);
  const d=document.createElement('div'); d.id=id; d.style='display:flex;gap:5px;margin-bottom:5px;align-items:center;';
  d.innerHTML=`<input type="text" class="v-name" value="${name}" placeholder="자료명" style="flex:1;border:1px solid var(--border);border-radius:8px;padding:8px;outline:none;">
    <input type="url" class="v-link" value="${link}" placeholder="링크" style="flex:2;border:1px solid var(--border);border-radius:8px;padding:8px;outline:none;">
    <button style="border:none;background:none;font-size:16px;cursor:pointer;">✕</button>`;
  d.querySelector('button').onclick=()=>d.remove();
  document.getElementById('resourceList').appendChild(d);
}
function addVideo(){
  const url=document.getElementById('videoUrlInput').value;
  const m=url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
  if(!m){showToast('유튜브 링크를 확인해 주세요.');return;}
  const id='vid'+Date.now();
  const d=document.createElement('div'); d.id=id; d.style='width:150px;position:relative;';
  d.innerHTML=`<img src="https://img.youtube.com/vi/${m[1]}/hqdefault.jpg" style="width:100%;border-radius:8px;" data-url="${url}">
    <input type="text" class="v-cmt" placeholder="영상 코멘트" style="width:100%;border:1px solid var(--border);font-size:11px;margin-top:4px;border-radius:6px;padding:4px 6px;outline:none;">
    <button style="position:absolute;top:-5px;right:-5px;background:red;color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:12px;">✕</button>`;
  d.querySelector('button').onclick=()=>d.remove();
  document.getElementById('videoList').appendChild(d);
  document.getElementById('videoUrlInput').value='';
}

addHwRow(); addSubjRow(); addTodayHwRow(); addResourceRow();

// ── 사진 ──
function handlePhotoUpload(e, cid){
  const arr=(cid==='hwPhotos')?hwPhotos:classPhotos;
  Array.from(e.target.files).forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const cvs=document.createElement('canvas'); const MAX=600; const sc=Math.min(MAX/img.width,1);
        cvs.width=img.width*sc; cvs.height=img.height*sc;
        cvs.getContext('2d').drawImage(img,0,0,cvs.width,cvs.height);
        arr.push({id:'p'+Date.now()+Math.random(),src:cvs.toDataURL('image/jpeg',.7),driveUrl:'',caption:''});
        renderPhotos(cid,arr);
      }; img.src=ev.target.result;
    }; r.readAsDataURL(f);
  }); e.target.value='';
}
function renderPhotos(cid, arr){
  const g=document.getElementById(cid); g.innerHTML='';
  arr.forEach(p=>{
    const d=document.createElement('div'); d.className='photo-card';
    d.innerHTML=`<img src="${p.src}">
      <input type="url" class="photo-input" placeholder="고화질 드라이브 링크">
      <input type="text" class="photo-input" placeholder="사진 설명 (20자)">
      <button style="position:absolute;top:-5px;left:-5px;background:red;color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:11px;">✕</button>`;
    const inputs=d.querySelectorAll('input');
    inputs[0].value=p.driveUrl; inputs[0].oninput=e=>p.driveUrl=e.target.value;
    inputs[1].value=p.caption; inputs[1].oninput=e=>p.caption=e.target.value;
    d.querySelector('button').onclick=()=>removePhoto(p.id,cid);
    g.appendChild(d);
  });
}
function removePhoto(pid,cid){
  if(cid==='hwPhotos') hwPhotos=hwPhotos.filter(x=>x.id!==pid);
  else classPhotos=classPhotos.filter(x=>x.id!==pid);
  renderPhotos(cid,(cid==='hwPhotos')?hwPhotos:classPhotos);
}

// ── 이전 과제 불러오기 ──
function loadHomework(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const doc=new DOMParser().parseFromString(ev.target.result,'text/html');
    const old=doc.querySelectorAll('.data-today-hw');
    if(old.length===0){showToast('과제 데이터를 찾을 수 없습니다.');return;}
    document.getElementById('hwList').innerHTML='';
    old.forEach(el=>addHwRow(el.getAttribute('data-course'),el.getAttribute('data-content')));
    showToast('이전 과제를 불러왔습니다!');
  }; reader.readAsText(file);
}

// ── HTML 스냅샷 ──
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function buildSnapshot(){
  const name=document.getElementById('nameInput').value||'학생';
  const dateStr=document.getElementById('dateInput').value.replace(/-/g,'.');
  const notice=document.getElementById('noticeArea').value;
  let hwR='',subH='',vidH='',resH='',tHwH='',hideD='';

  document.querySelectorAll('#hwList .hw-row').forEach(r=>{
    const c=r.querySelector('.v-course').value,t=r.querySelector('.v-content').value;
    if(c||t) hwR+=`<div style="display:flex;border-bottom:1px solid #eee;padding:10px 0;"><div style="width:35%;font-weight:700;color:#16417C;">${esc(c)}</div><div style="flex:1;white-space:pre-wrap;">${esc(t)}</div></div>`;
  });
  document.querySelectorAll('#subjectList [id^="subj"]').forEach(r=>{
    const n=r.querySelector('.v-subj')?.value,t=r.querySelector('.v-content')?.value;
    if(n||t) subH+=`<div style="background:#f8fafc;border-radius:12px;padding:15px;margin-bottom:10px;"><div style="font-weight:800;color:#1e293b;margin-bottom:8px;">📘 ${esc(n)}</div><div style="white-space:pre-wrap;line-height:1.6;">${esc(t)}</div></div>`;
  });
  document.querySelectorAll('#videoList div').forEach(r=>{
    const img=r.querySelector('img'); if(!img) return;
    const u=img.getAttribute('data-url'),s=img.src,c=r.querySelector('.v-cmt').value;
    vidH+=`<div style="margin-bottom:15px;"><a href="${u}" target="_blank" style="display:block;position:relative;"><img src="${s}" style="width:100%;border-radius:12px;"><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,0,0,.8);color:#fff;width:40px;height:40px;border-radius:50%;text-align:center;line-height:40px;font-size:16px;">▶</div></a>${c?`<div style="text-align:center;margin-top:5px;font-weight:600;">${esc(c)}</div>`:''}</div>`;
  });
  document.querySelectorAll('#resourceList [id^="res"]').forEach(r=>{
    const n=r.querySelector('.v-name')?.value,l=r.querySelector('.v-link')?.value;
    if(n&&l) resH+=`<div style="display:flex;justify-content:space-between;align-items:center;background:#f1f5f9;padding:12px;border-radius:10px;margin-bottom:8px;"><span style="font-weight:700;">${esc(n)}</span><a href="${l}" target="_blank" style="background:#16417C;color:#fff;padding:6px 12px;border-radius:6px;text-decoration:none;font-size:12px;">연결</a></div>`;
  });
  document.querySelectorAll('#todayHwList .hw-row').forEach(r=>{
    const c=r.querySelector('.v-course').value,t=r.querySelector('.v-type').value,ct=r.querySelector('.v-content').value;
    if(c||ct){
      tHwH+=`<div style="display:flex;border-bottom:1px solid #e2e8f0;padding:12px 0;"><div style="width:30%;font-weight:700;color:#16417C;">${esc(c)}</div><div style="width:15%;"><span style="background:${t==='필수'?'#ef4444':'#3b82f6'};color:#fff;font-size:10px;padding:2px 5px;border-radius:4px;">${t}</span></div><div style="flex:1;white-space:pre-wrap;">${esc(ct)}</div></div>`;
      hideD+=`<div class="data-today-hw" data-course="${esc(c)}" data-content="${esc(ct)}" style="display:none;"></div>`;
    }
  });

  const photoRender=arr=>arr.map(p=>`<div style="margin-bottom:20px;">${p.driveUrl?`<a href="${esc(p.driveUrl)}" target="_blank">`:''}<img src="${p.src}" style="width:100%;border-radius:12px;border:1px solid #eee;">${p.driveUrl?'</a>':''}${p.caption?`<div style="text-align:center;margin-top:5px;font-size:13px;color:#666;">${esc(p.caption)}</div>`:''}</div>`).join('');
  const sec=(title,icon,content)=>content?`<div style="background:#fff;border-radius:20px;padding:24px 20px;margin-bottom:16px;box-shadow:0 4px 15px rgba(0,0,0,.03);"><div style="font-size:16px;font-weight:800;color:#16417C;margin-bottom:16px;border-bottom:2px solid #16417C;display:inline-block;padding-bottom:4px;">${icon} ${title}</div>${content}</div>`:'';

  return `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>지필드 리포트 - ${esc(name)}</title>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Apple SD Gothic Neo',sans-serif;background:#f1f5f9;color:#0f172a;}</style>
</head><body><div style="max-width:480px;margin:0 auto;min-height:100vh;">
<div id="cover" style="background:#0d1117;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30px;">
  <div style="border:1px solid #d4af37;border-radius:12px;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;">
    <div style="color:#d4af37;font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:20px;">G-FIELD GIFTED EDUCATION</div>
    <div style="color:#fff;font-size:18px;margin-bottom:8px;">성공하는 공부습관을 만드는</div>
    <div style="color:#fff;font-size:26px;font-weight:800;margin-bottom:20px;">지필드 영재교육<br>(${classType})</div>
    <div style="width:80%;height:1px;background:#333;margin:30px 0;"></div>
    <div style="color:#fff;font-size:24px;font-weight:800;margin-bottom:8px;">${esc(name)} 학생</div>
    <div style="color:#888;font-size:13px;margin-bottom:40px;">${dateStr} 학습 리포트</div>
    <button onclick="document.getElementById('cover').style.display='none';document.getElementById('main').style.display='block';window.scrollTo(0,0);" style="background:#d4af37;color:#000;border:none;padding:14px 35px;border-radius:35px;font-weight:800;cursor:pointer;">리포트 확인하기 ▼</button>
  </div>
</div>
<div id="main" style="display:none;padding:20px 16px;">
  <div style="background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;display:flex;justify-content:space-between;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,.03);">
    <div><div style="font-size:11px;color:#64748b;margin-bottom:4px;">학생</div><div style="font-weight:800;color:#16417C;">${esc(name)}</div></div>
    <div><div style="font-size:11px;color:#64748b;margin-bottom:4px;">날짜</div><div style="font-weight:800;color:#16417C;">${dateStr}</div></div>
    <div><div style="font-size:11px;color:#64748b;margin-bottom:4px;">유형</div><div style="font-weight:800;color:#16417C;">${classType}</div></div>
  </div>
  ${notice?`<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:16px;padding:16px;margin-bottom:16px;font-size:14px;line-height:1.6;white-space:pre-wrap;color:#451a03;">📢 ${esc(notice)}</div>`:''}
  ${sec('과제 확인','✅',hwR+(hwPhotos.length?`<div style="margin-top:15px;border-top:1px dashed #eee;padding-top:15px;">${photoRender(hwPhotos)}</div>`:''))}
  ${sec('학습 요약','📖',subH)}
  ${sec('수업 사진','📸',photoRender(classPhotos))}
  ${sec('동영상 강의','🎬',vidH)}
  ${sec('추가 자료','🔗',resH)}
  ${sec('오늘의 과제','✏️',tHwH)}
  <div style="text-align:center;margin:40px 0;font-size:11px;color:#94a3b8;">© G-Field Gifted Education</div>
  ${hideD}
</div>
</div></body></html>`;
}

// ── 구글 드라이브 저장 ──
async function saveToDrive(){
  const name=document.getElementById('nameInput').value.trim();
  if(!name){showToast('학생 이름을 입력해 주세요.');return;}
  const btn=document.getElementById('saveDriveBtn');
  btn.disabled=true; btn.textContent='⏳ 저장 중...';
  const dateStr=document.getElementById('dateInput').value.replace(/-/g,'');
  const fileName=`지필드_${dateStr}_${name}_${classType}_리포트.html`;
  try {
    const res=await fetch(scriptUrl,{
      method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({studentName:name,fileName,htmlContent:buildSnapshot()}),
      redirect:'follow'
    });
    const result=await res.json();
    if(result.result==='success'){
      setLink(result.url); showToast(`✅ '${name}' 폴더에 저장 완료!`);
    } else throw new Error(result.error);
  } catch(e){ alert('❌ 구글 드라이브 저장 실패!\n원인: '+e.message); }
  finally { btn.disabled=false; btn.textContent='💾 1단계: 구글 드라이브 저장'; }
}

// ── GitHub Pages 배포 ──
async function deployToGitHubPages(){
  const btn=document.getElementById('ghBtn');
  btn.disabled=true; btn.textContent='⏳ 배포 중...';
  try {
    const name=document.getElementById('nameInput').value.trim()||'학생';
    const dateStr=document.getElementById('dateInput').value.replace(/-/g,'');
    const fileName=`지필드_${dateStr}_${name}_${classType}_리포트.html`;
    const path=`${name}/${fileName}`;
    const content=btoa(unescape(encodeURIComponent(buildSnapshot())));
    const apiUrl=`https://api.github.com/repos/${ghUser}/${ghRepo}/contents/${encodeURIComponent(path)}`;
    const headers={'Authorization':'Bearer '+ghToken,'Content-Type':'application/json'};
    let sha=null;
    const chk=await fetch(apiUrl,{headers});
    if(chk.ok) sha=(await chk.json()).sha;
    const body={message:`[자동배포] ${name} 리포트`,content,branch:'main'};
    if(sha) body.sha=sha;
    const up=await fetch(apiUrl,{method:'PUT',headers,body:JSON.stringify(body)});
    if(!up.ok) throw new Error('GitHub 업로드 실패');
    const url=`https://${ghUser}.github.io/${ghRepo}/${name}/${fileName}`;
    setLink(url); showToast('🎉 배포 완료! (30초~1분 후 접속 가능)');
  } catch(e){ alert('❌ GitHub 오류: '+e.message); }
  finally { btn.disabled=false; btn.textContent='🔗 2단계: 웹 링크 생성'; }
}

function setLink(url){
  document.getElementById('resultUrl').href=url;
  document.getElementById('resultUrl').textContent=url;
  document.getElementById('linkResult').style.display='block';
  updateMsgBox(url);
}

// ── 시간대별 인사 문구 ──
function getGreeting(){
  const now=new Date();
  const h=now.getHours();
  const day=now.getDay(); // 0=일, 6=토
  if(day===0||day===6) return '즐거운 주말 되세요 😊';
  if(h>=6&&h<12) return '좋은 아침 되세요 🌅';
  if(h>=12&&h<20) return '즐거운 오후 되세요 ☀️';
  return '평안한 밤 되세요 🌙';
}

function updateMsgBox(url){
  const currentUrl = url || document.getElementById('resultUrl').href;
  if(!currentUrl || currentUrl==='#') return;
  const name=document.getElementById('nameInput').value.trim()||'학생';
  const rawD=document.getElementById('dateInput').value;
  const d=new Date(rawD+'T00:00:00');
  const yy=d.getFullYear()%100, mm=d.getMonth()+1, dd=d.getDate();
  const greeting=getGreeting();
  const msg=`안녕하세요, 어머니 🙂\n지필드 영재교육 노관호입니다.\n\n${yy}년 ${mm}월 ${dd}일 ${name} 학생의 학습 리포트입니다.\n\n${currentUrl}\n\n${greeting}`;
  document.getElementById('msgText').value=msg;
  document.getElementById('msgBox').style.display='block';
}

function copyMsg(){
  const t=document.getElementById('msgText');
  t.select(); t.setSelectionRange(0,99999);
  navigator.clipboard.writeText(t.value).then(()=>showToast('📋 메시지가 복사되었습니다!'))
    .catch(()=>{ document.execCommand('copy'); showToast('📋 복사 완료!'); });
}

// ── 카카오톡 공유 ──
function shareKakao(){
  const url=document.getElementById('resultUrl').href;
  if(!url||url==='#'){
    alert('🚨 먼저 [2단계: 웹 링크 생성] 버튼을 눌러주세요!');
    return;
  }
  const name=document.getElementById('nameInput').value.trim()||'학생';
  const rawD=document.getElementById('dateInput').value;
  const d=new Date(rawD+'T00:00:00');
  const dateStr=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;

  // ⚠️ 카카오 공유는 반드시 github.io 도메인에서 실행해야 작동!
  const isOnGithubPages = window.location.hostname.includes('github.io');
  if(!isOnGithubPages){
    // 현재 아티팩트(claude.ai)나 로컬에서 실행 중 → 문자 복사로 안내
    updateMsgBox(url);
    showToast('📱 카카오 공유는 배포 페이지에서만 작동해요. 아래 메시지를 복사해 보내주세요!');
    document.getElementById('msgBox').scrollIntoView({behavior:'smooth'});
    return;
  }

  // SDK 확인
  if(!window.Kakao){ alert('카카오 SDK 로딩 중입니다. 잠시 후 다시 시도해 주세요.'); return; }
  if(!Kakao.isInitialized()){ try{ Kakao.init(kakaoKey); }catch(e){ alert('카카오 초기화 실패: '+e.message); return; } }

  try {
    Kakao.Share.sendDefault({
      objectType:'feed',
      content:{
        title:`📚 ${name} 학생 학습 리포트`,
        description:`[지필드 영재교육] ${dateStr} (${classType})\n학습 리포트가 도착했습니다. 아래 버튼을 눌러 확인하세요.`,
        // 카카오 OG 크롤러가 읽을 수 있는 공개 이미지 URL 사용
        imageUrl:'https://docssam1.github.io/gfield-report/og-cover.png',
        link:{mobileWebUrl:url,webUrl:url}
      },
      buttons:[{title:'📖 리포트 확인하기',link:{mobileWebUrl:url,webUrl:url}}]
    });
  } catch(e){
    console.error('Kakao share error:', e);
    updateMsgBox(url);
    showToast('카카오 오류 → 아래 메시지를 복사해 보내주세요!');
    document.getElementById('msgBox').scrollIntoView({behavior:'smooth'});
  }
}

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
