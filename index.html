<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지필드 영재교육 스마트 CRM V_Final</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #f8fafc; --panel: #ffffff; --line: #e2e8f0; --line-strong: #cbd5e1;
      --text: #1e293b; --muted: #64748b; --brand: #1e3a8a; --brand-2: #2563eb;
      --gold: #d97706; --green: #15803d; --red: #b91c1c;
      --radius: 12px; --radius-lg: 20px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif; font-size: 14px; overflow-x: hidden; }
    button, input, textarea, select { font: inherit; outline: none; border: none; }
    button { cursor: pointer; transition: 0.2s; }
    
    /* 와이드 레이아웃 */
    .app-shell { width: min(1600px, 98%); margin: 0 auto; padding: 20px 0 60px; }
    
    /* 상단 네비게이션: 겹침 방지 및 퀵 링크 */
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; background: #fff; padding: 18px 24px; border-radius: var(--radius-lg); box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1.5px solid var(--line); flex-wrap: wrap; gap: 15px; }
    .brand-title { font-size: 24px; font-weight: 900; color: var(--brand); letter-spacing: -1px; margin: 0; }
    .quick-nav { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 10px; font-weight: 800; background: #fff; border: 1.5px solid var(--line-strong); color: var(--text); text-decoration: none; font-size: 13px; }
    .btn:hover { background: #f1f5f9; transform: translateY(-2px); border-color: var(--brand); }
    .btn.primary { background: var(--brand); color: #fff; border: none; }
    .btn.teal { background: #0f766e; color: #fff; border: none; }
    .btn.yellow { background: #FEE500; color: #191919; border: none; }
    .btn.ghost-ai { background: #eff6ff; color: #1d4ed8; font-size: 12px; padding: 6px 12px; font-weight: 900; border: 1px solid #bfdbfe; }
    .btn.ghost-revert { background: #fef2f2; color: #b91c1c; font-size: 12px; padding: 6px 12px; font-weight: 900; border: 1px solid #fecaca; }

    /* 파일 로더 */
    .file-loaders { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
    .file-loader-btn { flex: 1; min-width: 280px; background: #fff; border: 2.5px dashed var(--brand-2); color: var(--brand-2); padding: 18px; border-radius: 16px; text-align: center; font-weight: 900; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(37,99,235,0.05); }
    .file-loader-btn:hover { background: #eff6ff; border-style: solid; }
    .file-loader-btn input { display: none; }

    .workspace { display: grid; grid-template-columns: minmax(0, 1fr) 440px; gap: 28px; align-items: start; }
    @media (max-width: 1250px) { .workspace { grid-template-columns: 1fr; } }
    .main-stack { display: flex; flex-direction: column; gap: 20px; }
    .side-stack { display: flex; flex-direction: column; gap: 20px; position: sticky; top: 20px; }

    .mode-tabs { display: flex; gap: 10px; background: #e2e8f0; padding: 8px; border-radius: 20px; margin-bottom: 25px; }
    .mode-tab { flex: 1; padding: 16px; border-radius: 14px; font-weight: 900; font-size: 17px; color: #64748b; background: transparent; }
    .mode-tab.active { background: #fff; color: var(--brand); box-shadow: 0 5px 15px rgba(0,0,0,0.08); }

    .panel { background: var(--panel); border: 1.5px solid var(--line); border-radius: var(--radius-lg); padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.02); }
    .panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--line); padding-bottom: 16px; }
    .panel-title { font-size: 20px; font-weight: 900; color: var(--brand); display: flex; align-items: center; gap: 10px; }
    
    .field { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
    .field label { font-size: 14px; font-weight: 900; color: #475569; }
    input[type="text"], input[type="date"], input[type="url"], input[type="password"], select { width: 100%; padding: 16px; border-radius: 12px; border: 1.5px solid var(--line-strong); background: #fdfdfd; transition: 0.2s; font-size: 15px; }
    input:focus, textarea:focus { border-color: var(--brand-2); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08); }
    
    textarea { width: 100%; padding: 20px; border-radius: 16px; border: 1.5px solid var(--line-strong); background: #fdfdfd; min-height: 90px; line-height: 1.8; resize: none; overflow: hidden; font-size: 15px; }
    
    .dynamic-row { background: #f8fafc; border: 1.5px solid var(--line); border-radius: 16px; padding: 24px; margin-bottom: 18px; }
    .add-row-btn { width: 100%; padding: 18px; background: #fff; border: 2.5px dashed var(--line-strong); color: var(--muted); border-radius: 16px; font-weight: 900; margin-top: 10px; }

    .photo-grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 18px; }
    .photo-card { position: relative; width: 150px; display: flex; flex-direction: column; gap: 10px; }
    .photo-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 12px; border: 2px solid var(--line); box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
    .photo-card input { padding: 10px; font-size: 12px; text-align: center; border-radius: 8px; border: 1px solid var(--line); background: #fff; }
    .del-btn { position: absolute; top: -12px; right: -12px; background: var(--red); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #fff; }

    .msg-viewer { background: #fffdf4; border: 3px solid #fcd34d; padding: 28px; border-radius: var(--radius-lg); min-height: 450px; font-family: "Malgun Gothic", sans-serif; font-size: 16px; line-height: 1.8; color: #1e293b; white-space: pre-wrap; }
    .action-dock { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 25px; }
    .action-dock .btn { padding: 20px; font-size: 17px; justify-content: center; border: none; }

    .todo-panel { background: #fff; border: 2px solid var(--line-strong); border-radius: 24px; padding: 28px; }
    .todo-list { max-height: 350px; overflow-y: auto; margin-bottom: 25px; }
    .todo-item { display: flex; align-items: flex-start; gap: 15px; padding: 14px 0; border-bottom: 1.5px solid #f1f5f9; font-size: 15px; font-weight: 800; color: #334155; }
    .todo-item input[type="checkbox"] { margin-top: 4px; accent-color: var(--brand); width: 20px; height: 20px; }
    .todo-item.done span { text-decoration: line-through; color: #94a3b8; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; width: 100%; max-width: 750px; padding: 45px; border-radius: 32px; max-height: 94vh; overflow-y: auto; }

    .toast { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background: #0f172a; color: #fff; padding: 18px 40px; border-radius: 50px; font-weight: 900; font-size: 16px; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-20px); }
  </style>
</head>
<body>

  <div class="app-shell">
    <header class="topbar">
      <h1 class="brand-title">지필드 영재교육 <span style="font-size:15px; color:var(--muted); font-weight:500;">CRM Cloud Master V_Final</span></h1>
      <div class="quick-nav">
        <a href="https://docs.google.com/spreadsheets/d/1Ta1o_v504jtDsyHPY0bER6WpI3xYTbVVffEl0iy58f8/edit" target="_blank" class="btn teal"><i data-lucide="table"></i> 대시보드</a>
        <a href="https://script.google.com/home" target="_blank" class="btn"><i data-lucide="code"></i> Script 가기</a>
        <a href="https://github.com/docssam1/gfield-report" target="_blank" class="btn"><i data-lucide="github"></i> 깃허브 가기</a>
        <button class="btn primary" onclick="$('#settingsModal').classList.add('show')"><i data-lucide="settings"></i> 설정</button>
      </div>
    </header>

    <div class="file-loaders">
      <label class="file-loader-btn">
        <i data-lucide="copy"></i> 1. 다른 학생 리포트 복사 (틀 덮어쓰기)
        <input type="file" accept=".html" class="hidden" onchange="parseHTMLFile(event, 'all')">
      </label>
      <label class="file-loader-btn" style="border-color:var(--gold); color:var(--gold);">
        <i data-lucide="history"></i> 2. 이전 과제만 쏙 불러오기
        <input type="file" accept=".html" class="hidden" onchange="parseHTMLFile(event, 'homework')">
      </label>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="regular">📚 정규 수업</button>
      <button class="mode-tab" data-mode="makeup">🔄 보충 수업</button>
      <button class="mode-tab" data-mode="absent" style="color:var(--red);">🚫 결석 / 휴강</button>
      <button class="mode-tab" data-mode="consult" style="color:var(--gold);">📞 상담 / 수업안내</button>
    </div>

    <div class="workspace">
      <main class="main-stack">
        <section class="panel">
          <div style="display:grid; grid-template-columns: 1.5fr 1fr 1fr; gap:20px;">
            <div class="field">
              <label>학생 검색 (이름 또는 전화번호)</label>
              <div style="display:flex; gap:10px;">
                <input type="text" id="nameInput" placeholder="검색 후 엔터" onkeypress="if(event.key==='Enter') searchStudent()">
                <button class="btn primary" onclick="searchStudent()"><i data-lucide="search"></i></button>
              </div>
            </div>
            <div class="field"><label>수업일/공지일</label><input type="date" id="dateInput"></div>
            <div class="field"><label>과정 / 시간표</label><input type="text" id="courseInput" placeholder="심화수학 금 2시"></div>
          </div>
          <div class="field" style="margin-top:20px;">
            <label>연락처 (알리고 단체발송용 - 검색 시 자동 로드)</label>
            <input type="text" id="phoneInput" placeholder="010-1234-5678, 010-5678-1234">
          </div>
        </section>

        <!-- 상담/CS 모드 -->
        <section class="panel hidden" id="csPanel">
          <div class="panel-head"><div class="panel-title"><i data-lucide="credit-card"></i> 계좌 선택 및 안내문 작성</div></div>
          <div style="display:flex; gap:12px; margin-bottom:25px;">
            <label style="flex:1; cursor:pointer; background:#f8fafc; border:2px solid var(--line-strong); border-radius:14px; padding:18px; text-align:center; font-weight:900;">
              <input type="radio" name="bank" value="우리은행 100-2629-797436 이주연 지필드영재교육" style="width:auto; margin-right:8px;"> 이주연(우리)
            </label>
            <label style="flex:1; cursor:pointer; background:#f8fafc; border:2px solid var(--line-strong); border-radius:14px; padding:18px; text-align:center; font-weight:900;">
              <input type="radio" name="bank" value="하나은행 853-910-18114807 노관호 지필드 영재교육" style="width:auto; margin-right:8px;"> 노관호(하나)
            </label>
            <label style="flex:1; cursor:pointer; background:#f8fafc; border:2px solid var(--line-strong); border-radius:14px; padding:18px; text-align:center; font-weight:900;">
              <input type="radio" name="bank" value="" style="width:auto; margin-right:8px;" checked> 안내 없음
            </label>
          </div>
          <textarea id="csMemo" placeholder="안내사항이나 상담 기록을 적어주세요."></textarea>
        </section>

        <!-- 리포트 공지 -->
        <section class="panel report-only">
          <div class="panel-head">
            <div class="panel-title"><i data-lucide="megaphone"></i> 📢 전달 사항</div>
            <div style="display:flex; gap:8px;">
              <button class="btn ghost-ai" onclick="aiPolish('noticeArea')">✨ AI 다듬기</button>
              <button class="btn ghost-revert" onclick="aiRevert('noticeArea')">↺ 되돌리기</button>
            </div>
          </div>
          <textarea id="noticeArea" placeholder="공지사항을 입력하세요." oninput="autoExpand(this); generateMsg();"></textarea>
        </section>

        <section class="panel report-only">
          <div class="panel-head"><div class="panel-title"><i data-lucide="check-circle-2"></i> ✅ 지난 과제 확인</div></div>
          <div id="hwList"></div>
          <button class="add-row-btn" onclick="addHwRow()">+ 과제 평가 추가</button>
          
          <div style="margin-top:30px; padding:25px; background:#fff; border:2px dashed var(--line-strong); border-radius:20px;">
            <label style="font-weight:900; color:var(--brand); display:block; margin-bottom:15px;">📸 과제 사진 (구글 드라이브 링크)</label>
            <div style="display:flex; gap:12px;">
              <input type="url" id="hwPhotoUrl" placeholder="링크가 없으면 버튼 클릭 시 드라이브 폴더가 열립니다." style="flex:1;">
              <button class="btn teal" onclick="addDrivePhoto('hwPhotoUrl', 'hwPhotos')">사진 추가</button>
            </div>
            <div class="photo-grid" id="hwPhotos"></div>
          </div>
        </section>

        <section class="panel report-only">
          <div class="panel-head"><div class="panel-title"><i data-lucide="book-marked"></i> 📖 오늘 학습 내용 요약</div></div>
          <div id="subjList"></div>
          <button class="add-row-btn" onclick="addSubjRow()">+ 학습 단원/내용 추가</button>

          <div style="margin-top:30px; padding:25px; background:#fff; border:2px dashed var(--line-strong); border-radius:20px;">
            <label style="font-weight:900; color:var(--brand); display:block; margin-bottom:15px;">📸 수업 사진 (구글 드라이브 링크)</label>
            <div style="display:flex; gap:12px;">
              <input type="url" id="classPhotoUrl" placeholder="드라이브 주소를 붙여넣으세요." style="flex:1;">
              <button class="btn teal" onclick="addDrivePhoto('classPhotoUrl', 'classPhotos')">사진 추가</button>
            </div>
            <div class="photo-grid" id="classPhotos"></div>
          </div>
        </section>

        <section class="panel report-only">
          <div class="panel-head"><div class="panel-title"><i data-lucide="youtube"></i> 🎬 유튜브 강의 및 자료</div></div>
          <div style="display:flex; gap:12px; margin-bottom:20px;">
            <input type="url" id="videoUrl" placeholder="유튜브 링크 입력" style="flex:1;">
            <button class="btn primary" onclick="addVideo()">강의 추가</button>
          </div>
          <div class="photo-grid" id="videoList" style="margin-bottom:30px;"></div>
          <div id="resourceList"></div>
          <button class="add-row-btn" onclick="addResourceRow()">+ 웹 링크 자료 추가</button>
        </section>

        <section class="panel report-only">
          <div class="panel-head"><div class="panel-title"><i data-lucide="pencil-line"></i> ✏️ 오늘의 숙제 안내</div></div>
          <div id="todayHwList"></div>
          <button class="add-row-btn" onclick="addTodayHwRow()">+ 숙제 항목 추가</button>
        </section>
      </main>

      <aside class="side-stack">
        <section class="panel" style="padding:0; overflow:hidden; border-color:#fcd34d;">
          <div class="panel-head" style="margin:0; padding:20px; background:#fef3c7; border-bottom:2.5px solid #fcd34d;">
            <div class="panel-title" style="color:#b45309;"><i data-lucide="smartphone"></i> 안내 메시지 프리뷰</div>
            <div style="display:flex; gap:6px;">
              <button class="btn ghost-ai" onclick="aiPolish('msgText')" style="background:#fff;">✨ AI</button>
              <button class="btn ghost-revert" onclick="aiRevert('msgText')" style="background:#fff;">↺</button>
            </div>
          </div>
          <textarea id="msgText" class="msg-viewer" readonly style="border:none; border-radius:0;"></textarea>
          <button onclick="summarizeToTodo()" style="width:100%; padding:18px; background:#fffbeb; color:#b45309; border-top:2px solid #fde68a; font-weight:900; display:flex; align-items:center; justify-content:center; gap:10px; font-size:16px;">
            <i data-lucide="arrow-down-square"></i> 중요 사항 DO-IT으로 보내기
          </button>
        </section>

        <div class="action-dock">
          <button class="btn" style="background:#000; color:#fff;" onclick="syncToNotion()"><i data-lucide="calendar"></i> 1. 노션(Notion) 캘린더 등록</button>
          <button class="btn primary" onclick="saveToDrive()"><i data-lucide="save"></i> 2. 시트/드라이브 저장 및 링크</button>
          <button class="btn yellow" onclick="shareKakao()"><i data-lucide="message-circle"></i> 3. 카카오톡 리포트 전송</button>
          <button class="btn" style="background:#2563eb; color:#fff;" onclick="sendAligoBulk()"><i data-lucide="send"></i> 4. 알리고 단체 문자 발송</button>
        </div>

        <section class="todo-panel">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="font-size:18px; font-weight:900; color:var(--brand); align-items:center; gap:8px;"><i data-lucide="cloud"></i> 클라우드 DO-IT</h3>
            <button onclick="loadTodos()" style="background:none; color:var(--muted);"><i data-lucide="refresh-cw" style="width:18px;"></i></button>
          </div>
          <div class="todo-list" id="todoList"></div>
          <div style="display:flex; gap:12px;">
            <input type="text" id="todoInput" placeholder="할 일 입력..." onkeypress="if(event.key==='Enter') addTodo()" style="padding:14px; border:2px solid var(--line-strong); border-radius:12px; width:100%;">
            <button class="btn primary" onclick="addTodo()">추가</button>
          </div>
        </section>
      </aside>
    </div>
  </div>

  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="panel-head" style="margin-bottom:30px; padding:0; border:none;">
        <h3 class="panel-title" style="font-size:24px;"><i data-lucide="settings"></i> 지필드 통합 API 설정</h3>
        <button class="icon-btn" onclick="$('#settingsModal').classList.remove('show')" style="background:none;"><i data-lucide="x"></i></button>
      </div>
      <div class="field"><label>📦 구글 Apps Script URL</label><input type="text" id="k_script" placeholder="https://script.google.com/macros/..."></div>
      <div class="field"><label>🤖 Gemini API Key</label><input type="password" id="k_gemini"></div>
      <div class="field"><label>🐱 GitHub Token</label><input type="password" id="k_gh"></div>
      <div class="field"><label>💬 Kakao JS Key</label><input type="text" id="k_kakao"></div>
      <div style="display:flex; gap:15px;">
        <div class="field" style="flex:1;"><label>📓 Notion API Key</label><input type="password" id="k_notion_key"></div>
        <div class="field" style="flex:1;"><label>📓 Notion Database ID</label><input type="text" id="k_notion_db"></div>
      </div>
      <div class="field"><label>🌐 알리고 VPS 주소</label><input type="text" id="k_vps" value="http://185.238.241.138:8080/send"></div>
      <button class="btn primary" style="width:100%; padding:22px; margin-top:20px; font-size:18px;" onclick="saveKeys()">💾 모든 설정 영구 저장</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);
    const state = { mode: 'regular', aiHistory: {}, todos: [] };
    const DRIVE_FOLDER_URL = "https://drive.google.com/drive/folders/1ydIsZGns3_yq--hRaYEvORViWiCUrgy6?usp=drive_link";

    function autoExpand(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
    function showToast(msg) { const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500); }
    function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

    const keys = ['script', 'gemini', 'gh', 'kakao', 'notion_key', 'notion_db', 'vps'];
    function loadKeys() { keys.forEach(k => { if($(`#k_${k}`)) $(`#k_${k}`).value = localStorage.getItem(`gf_${k}`) || $(`#k_${k}`).value; }); }
    function saveKeys() { 
        keys.forEach(k => localStorage.setItem(`gf_${k}`, $(`#k_${k}`).value.trim())); 
        $('#settingsModal').classList.remove('show'); showToast("설정이 저장되었습니다."); 
        if(window.Kakao && !Kakao.isInitialized() && $(`#k_kakao`).value) Kakao.init($(`#k_kakao`).value); 
        loadTodos(); 
    }

    window.onload = () => {
        lucide.createIcons(); loadKeys();
        $('#dateInput').value = new Date().toISOString().split('T')[0];
        if(localStorage.getItem('gf_kakao') && window.Kakao) Kakao.init(localStorage.getItem('gf_kakao'));
        
        $$('.mode-tab').forEach(b => b.addEventListener('click', e => {
            $$('.mode-tab').forEach(t => t.classList.remove('active')); e.target.classList.add('active');
            state.mode = e.target.dataset.mode;
            const isCs = state.mode === 'consult';
            $$('.report-only').forEach(el => el.classList.toggle('hidden', isCs));
            $('#csPanel').classList.toggle('hidden', !isCs);
            $('#msgText').readOnly = !isCs;
            generateMsg();
        }));
        
        $$('input[name="bank"]').forEach(r => r.addEventListener('change', generateMsg));
        ['nameInput', 'dateInput', 'courseInput', 'noticeArea', 'csMemo'].forEach(id => $(`#${id}`).addEventListener('input', generateMsg));

        addHwRow(); addSubjRow(); addTodayHwRow(); loadTodos();
    };

    function addDrivePhoto(inputId, targetGridId) {
        const url = $(`#${inputId}`).value.trim();
        if(!url) { window.open(DRIVE_FOLDER_URL, '_blank'); return; }
        const match = url.match(/\/d\/([a-zA-Z0-9_-]+)|\?id=([a-zA-Z0-9_-]+)/);
        if(!match) return alert("유효한 구글 드라이브 링크가 아닙니다.");
        const fileId = match[1] || match[2];
        const thumbUrl = `https://drive.google.com/thumbnail?id=${fileId}&sz=w600`;
        const div = document.createElement('div'); div.className = 'photo-card';
        div.dataset.url = url; div.dataset.src = thumbUrl;
        div.innerHTML = `<img src="${thumbUrl}"><input type="text" placeholder="사진 코멘트" oninput="generateMsg()"><button class="del-btn" onclick="this.parentElement.remove(); generateMsg();">✕</button>`;
        $(`#${targetGridId}`).appendChild(div); $(`#${inputId}`).value = ''; generateMsg();
    }

    function addHwRow(c='', p='', m='') {
        const id = 'hw_' + Date.now() + Math.floor(Math.random()*1000);
        const div = document.createElement('div'); div.className = 'dynamic-row';
        div.innerHTML = `
            <div style="display:grid; grid-template-columns: 1fr 140px; gap:12px; margin-bottom:12px;">
                <input type="text" class="v-course" placeholder="과정명" value="${c}" oninput="generateMsg()">
                <select class="v-perf" onchange="generateMsg()">
                    <option value="">수행 상태</option><option value="done" ${p==='done'?'selected':''}>✅ 수행</option><option value="partial" ${p==='partial'?'selected':''}>🔶 부분</option><option value="miss" ${p==='miss'?'selected':''}>❌ 미수행</option>
                </select>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <label style="font-size:12px; font-weight:bold;">과제 코멘트</label>
                <div style="display:flex; gap:5px;">
                    <button class="btn ghost-ai" onclick="aiPolish('${id}')">✨ AI</button>
                    <button class="btn ghost-revert" onclick="aiRevert('${id}')">↺</button>
                    <button style="color:var(--red); font-weight:bold; margin-left:10px;" onclick="this.parentElement.parentElement.parentElement.remove(); generateMsg();">✕ 삭제</button>
                </div>
            </div>
            <textarea id="${id}" class="v-content" placeholder="피드백 내용" oninput="autoExpand(this); generateMsg();">${m}</textarea>
        `;
        $('#hwList').appendChild(div);
    }

    function addSubjRow(s='', c='') {
        const id = 'sub_' + Date.now() + Math.floor(Math.random()*1000);
        const div = document.createElement('div'); div.className = 'dynamic-row';
        div.innerHTML = `
            <div style="display:flex; gap:12px; align-items:center; margin-bottom:12px;">
                <input type="text" class="v-subj" placeholder="과목명" value="${s}" style="flex:1; font-weight:900;" oninput="generateMsg()">
                <button class="btn ghost-ai" onclick="aiPolish('${id}')">✨ AI</button>
                <button class="btn ghost-revert" onclick="aiRevert('${id}')">↺</button>
                <button style="color:var(--red); font-weight:bold; margin-left:8px;" onclick="this.parentElement.parentElement.remove(); generateMsg();">✕</button>
            </div>
            <textarea id="${id}" class="v-content" placeholder="학습 요약" oninput="autoExpand(this); generateMsg();">${c}</textarea>
        `;
        $('#subjList').appendChild(div);
    }

    function addTodayHwRow(c='', t='필수', m='') {
        const div = document.createElement('div'); div.className = 'dynamic-row';
        div.innerHTML = `
            <div style="display:grid; grid-template-columns: 1fr 100px auto; gap:10px; align-items:center;">
                <input type="text" class="v-course" placeholder="과정명" value="${c}" oninput="generateMsg()">
                <select class="v-type" onchange="generateMsg()"><option ${t==='필수'?'selected':''}>필수</option><option ${t==='선택'?'selected':''}>선택</option></select>
                <button style="color:var(--red); font-weight:bold; font-size:18px;" onclick="this.parentElement.parentElement.remove(); generateMsg();">✕</button>
            </div>
            <textarea class="v-content" placeholder="과제 내용" oninput="autoExpand(this); generateMsg();" style="margin-top:12px;">${m}</textarea>
        `;
        $('#todayHwList').appendChild(div);
    }

    function addResourceRow(n='', l='') {
        const div = document.createElement('div'); div.className = 'dynamic-row'; div.style.display = 'flex'; div.style.gap = '12px';
        div.innerHTML = `
            <input type="text" class="v-name" placeholder="자료명" value="${n}" style="flex:1;" oninput="generateMsg()">
            <input type="url" class="v-link" placeholder="링크(https://...)" value="${l}" style="flex:2.5;" oninput="generateMsg()">
            <button style="color:var(--red); font-weight:bold; width:35px;" onclick="this.parentElement.remove(); generateMsg();">✕</button>
        `;
        $('#resourceList').appendChild(div);
    }

    function addVideo() {
        const url = $('#videoUrl').value.trim();
        if(!url) { window.open('https://studio.youtube.com/', '_blank'); return; }
        const match = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
        if(!match) return showToast("유튜브 주소를 확인하세요.");
        const div = document.createElement('div'); div.className = 'photo-card'; div.style.width = '200px';
        div.dataset.url = url;
        div.innerHTML = `<img src="https://img.youtube.com/vi/${match[1]}/hqdefault.jpg" style="aspect-ratio:16/9;"><input type="text" placeholder="영상 설명" oninput="generateMsg()"><button class="del-btn" onclick="this.parentElement.remove(); generateMsg();">✕</button>`;
        $('#videoList').appendChild(div); $('#videoUrl').value = ''; generateMsg();
    }

    function generateMsg() {
        const n = $('#nameInput').value.trim() || '학생';
        const d = $('#dateInput').value;
        const ta = $('#msgText');
        let msg = `안녕하세요, 지필드 영재교육입니다.\n\n`;
        if(state.mode !== 'consult') {
            const types = {regular:'정규수업', makeup:'보충수업', absent:'결석/휴강'};
            msg += `[${d} ${n} 학생 ${types[state.mode]} 리포트]\n\n`;
            const nt = $('#noticeArea').value.trim(); if(nt) msg += `📢 공지:\n${nt}\n\n`;
            let hws = ''; $$('#hwList .dynamic-row').forEach(r => { const c = r.querySelector('.v-course').value; const t = r.querySelector('.v-content').value; if(c||t) hws += `- ${c}: ${t}\n`; });
            if(hws) msg += `✅ 과제 피드백:\n${hws}\n`;
            let subs = ''; $$('#subjList .dynamic-row').forEach(r => { const s = r.querySelector('.v-subj').value; const c = r.querySelector('.v-content').value; if(s||c) subs += `- ${s}: ${c}\n`; });
            if(subs) msg += `📖 학습 내용:\n${subs}\n`;
            msg += `자세한 사진과 자료는 하단 링크에서 확인해주세요.`;
        } else {
            const acc = document.querySelector('input[name="bank"]:checked')?.value;
            const cs = $('#csMemo').value.trim();
            msg += `[안내 및 상담]\n대상: ${n} 학생\n일자: ${d}\n\n${cs}\n`;
            if(acc) msg += `\n[수강료 입금 계좌]\n${acc}\n`;
        }
        if(ta.readOnly) { ta.value = msg; autoExpand(ta); }
    }

    async function loadTodos() {
        const url = localStorage.getItem('gf_script'); if(!url) return;
        try {
            const res = await fetch(url, { method: 'POST', body: JSON.stringify({ action: 'load_todos' }) });
            const d = await res.json(); state.todos = JSON.parse(d.data || '[]'); renderTodos();
        } catch(e) { $('#todoList').innerHTML = '<div style="text-align:center; color:#999;">로드 실패</div>'; }
    }
    function renderTodos() {
        const l = $('#todoList'); l.innerHTML = '';
        if(!state.todos.length) l.innerHTML = '<div style="text-align:center; color:#94a3b8; font-size:15px; padding:25px;">현재 할 일이 없습니다.</div>';
        state.todos.forEach((t, i) => {
            const d = document.createElement('div'); d.className = t.done ? 'todo-item done' : 'todo-item';
            d.innerHTML = `<input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${i})"><span style="flex:1;">${esc(t.text)}</span><button style="color:var(--red); font-weight:bold; font-size:22px;" onclick="delTodo(${i})">✕</button>`;
            l.appendChild(d);
        });
    }
    async function saveTodos() {
        const url = localStorage.getItem('gf_script'); if(!url) return;
        fetch(url, { method: 'POST', body: JSON.stringify({ action: 'save_todos', todos: state.todos }) });
    }
    function addTodo(txt) {
        const v = txt || $('#todoInput').value.trim(); if(!v) return;
        state.todos.unshift({text: v, done: false}); $('#todoInput').value = ''; renderTodos(); saveTodos();
    }
    function toggleTodo(i) { state.todos[i].done = !state.todos[i].done; renderTodos(); saveTodos(); }
    function delTodo(i) { state.todos.splice(i, 1); renderTodos(); saveTodos(); }
    
    async function summarizeToTodo() {
        const msg = $('#msgText').value.trim(); if(!msg) return;
        const key = localStorage.getItem('gf_gemini');
        if(key) {
            showToast("AI 요약 중...");
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, { method:'POST', body: JSON.stringify({ contents: [{ parts: [{ text: `다음 안내문에서 학원 원장님이 꼭 챙겨야 할 보강일, 약속, 미납액, 특이사항 등 핵심 할일 1문장만 요약해줘:\n${msg}` }] }] }) });
                const d = await res.json(); addTodo(d.candidates[0].content.parts[0].text); showToast("등록 완료!");
            } catch(e) { addTodo(msg.substring(0, 40) + "..."); }
        } else { addTodo(msg.substring(0, 40) + "..."); }
    }

    async function aiPolish(tid) {
        const key = localStorage.getItem('gf_gemini'); if(!key) return showToast("Gemini Key를 넣어주세요.");
        const el = $(`#${tid}`); if(!el.value.trim()) return;
        showToast("AI 다듬는 중...");
        state.aiHistory[tid] = state.aiHistory[tid] || []; state.aiHistory[tid].push(el.value);
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, { method:'POST', body: JSON.stringify({ contents: [{ parts: [{ text: `다정한 학원 원장님 말투로 핵심 내용은 유지하며 문장을 학부모님용 리포트/안내문에 맞게 신뢰감 있게 다듬어줘:\n${el.value}` }] }] }) });
            const d = await res.json(); el.value = d.candidates[0].content.parts[0].text;
            autoExpand(el); generateMsg(); showToast("✨ AI 다듬기 성공!");
        } catch(e) { showToast("AI 통신 오류"); }
    }
    function aiRevert(tid) {
        if(!state.aiHistory[tid] || !state.aiHistory[tid].length) return showToast("되돌릴 내용 없음");
        $(`#${tid}`).value = state.aiHistory[tid].pop(); autoExpand($(`#${tid}`)); generateMsg();
    }

    async function searchStudent() {
        const q = $('#nameInput').value.trim().split(',')[0];
        const url = localStorage.getItem('gf_script');
        if(!url || !q) return showToast("이름과 GAS URL 설정을 확인하세요.");
        try {
            const res = await fetch(url, { method: 'POST', body: JSON.stringify({ action: 'search_student', query: q }) });
            const d = await res.json();
            if(d.data && d.data.length > 0) {
                $('#nameInput').value = d.data[0].name; $('#phoneInput').value = d.data[0].phone;
                showToast(`${d.data[0].name} 로드 완료`); generateMsg();
            } else showToast("등록된 학생이 없습니다.");
        } catch(e) { showToast("통신 오류 발생"); }
    }

    async function sendAligoBulk() {
        const phones = $('#phoneInput').value.split(',').map(p=>p.trim()).filter(p=>p);
        const msg = $('#msgText').value.trim(); const vps = localStorage.getItem('gf_vps');
        if(!phones.length || !msg || !vps) return showToast("연락처, 메시지, VPS 주소를 확인하세요.");
        if(!confirm(`총 ${phones.length}명에게 알리고 문자를 발송하시겠습니까?`)) return;
        for(let p of phones) {
            try { await fetch(vps, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ receiver: p, msg: msg, sender: '01020837265' }) }); } catch(e) {}
        }
        showToast(`✅ 발송 요청 완료`);
    }

    async function saveToDrive() {
        const url = localStorage.getItem('gf_script'); if(!url) return showToast("GAS URL을 입력하세요.");
        showToast("서버 저장 중...");
        try {
            const res = await fetch(url, { method:'POST', body:JSON.stringify({ action: 'save_drive', studentName: $('#nameInput').value, date: $('#dateInput').value, htmlContent: $('#msgText').value, phone: $('#phoneInput').value, type: state.mode }) });
            const d = await res.json(); if(d.result==='success') showToast("✅ 저장 완료!");
        } catch(e) { showToast("저장 실패"); }
    }

    function shareKakao() {
        const url = "https://docssam1.github.io/gfield-report/"; // 실제 리포트 배포 주소로 변경 필요
        if(!window.Kakao || !Kakao.isInitialized()) return showToast("카카오 설정을 확인하세요.");

        const n = $('#nameInput').value.trim() || '학생';
        const d = $('#dateInput').value;
        const types = {regular:'정규수업', makeup:'보충수업', makeup_done:'보강완료', absent:'결석/휴강'};
        const typeStr = types[state.mode] || '안내문';

        // 🌟 테마별 썸네일 이미지 매칭 로직
        const baseUrl = "https://docssam1.github.io/gfield-report";
        let kImg = `${baseUrl}/og-cover.png`; // 기본값 (정규수업)

        if(state.mode === 'makeup') kImg = `${baseUrl}/makeup-cover.png`;
        if(state.mode === 'absent') kImg = `${baseUrl}/absent-cover.png`;
        if(state.mode === 'consult') kImg = `${baseUrl}/consult-cover.png`;

        Kakao.Share.sendDefault({
            objectType: 'feed',
            content: {
                title: `[지필드 영재교육] ${typeStr}`,
                description: `${n} 학생의 소중한 학습 데이터가 도착했습니다.`,
                imageUrl: kImg,
                link: { mobileWebUrl: url, webUrl: url }
            },
            buttons: [{ title: '리포트 확인하기', link: { mobileWebUrl: url, webUrl: url } }]
        });
    }

    function parseHTMLFile(e, mode) {
        const f = e.target.files[0]; if(!f) return;
        const r = new FileReader();
        r.onload = ev => {
            const doc = new DOMParser().parseFromString(ev.target.result, 'text/html');
            const bodyText = doc.body.innerText || "";
            if(mode === 'homework') { addHwRow('', '', bodyText.substring(0, 300)); } 
            else { $('#noticeArea').value = "복사된 내용입니다."; addHwRow('', '', bodyText.substring(0, 500)); }
            generateMsg(); showToast("파일 로드 완료");
        };
        r.readAsText(f); e.target.value = ''; 
    }
  </script>
</body>
</html>
